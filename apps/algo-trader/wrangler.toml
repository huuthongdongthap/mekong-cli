name = "algo-trader-worker"
main = "src/api/gateway.ts"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

[build]
command = "npm run build:worker"

[vars]
NODE_ENV = "production"

[secrets]
DATABASE_URL
EXCHANGE_API_KEY
EXCHANGE_SECRET
POLAR_WEBHOOK_SECRET

[env.staging]
name = "algo-trader-staging"

[env.staging.vars]
NODE_ENV = "staging"
