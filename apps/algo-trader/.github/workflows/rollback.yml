name: Algo Trader Manual Rollback

# This workflow provides manual rollback functionality via workflow_dispatch
# Allows rolling back to previous successful deployments with PM2 commands and health checks

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment to rollback'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging
      rollback_to_commit:
        description: 'Specific commit SHA to rollback to (optional, defaults to previous deployment)'
        required: false
        type: string
      max_rollback_attempts:
        description: 'Maximum number of rollback attempts'
        required: false
        default: '3'
        type: number

env:
  NODE_VERSION: '20'

jobs:
  validate-inputs:
    name: Validate Inputs
    runs-on: ubuntu-latest
    steps:
      - name: Validate environment input
        run: |
          if [[ "${{ github.event.inputs.environment }}" != "production" && "${{ github.event.inputs.environment }}" != "staging" ]]; then
            echo "❌ Invalid environment: ${{ github.event.inputs.environment }}"
            exit 1
          fi
          echo "✅ Valid environment: ${{ github.event.inputs.environment }}"

      - name: Validate rollback commit (if provided)
        if: github.event.inputs.rollback_to_commit != ''
        run: |
          COMMIT="${{ github.event.inputs.rollback_to_commit }}"
          if ! [[ $COMMIT =~ ^[a-f0-9]{7,40}$ ]]; then
            echo "❌ Invalid commit SHA: $COMMIT"
            exit 1
          fi
          echo "✅ Valid commit SHA: $COMMIT"

  rollback-production:
    name: Rollback Production
    runs-on: ubuntu-latest
    needs: [validate-inputs]
    if: github.event.inputs.environment == 'production'
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Determine rollback target
        id: rollback_target
        run: |
          if [ -n "${{ github.event.inputs.rollback_to_commit }}" ]; then
            echo "target_commit=${{ github.event.inputs.rollback_to_commit }}" >> $GITHUB_OUTPUT
            echo "Using specified commit: ${{ github.event.inputs.rollback_to_commit }}"
          else
            # Get previous successful deployment commit
            PREVIOUS_COMMIT=$(git log --grep="✅ Deploy complete" -n 2 --pretty=format:"%H" | tail -n 1)
            if [ -z "$PREVIOUS_COMMIT" ]; then
              echo "❌ No previous successful deployment found"
              exit 1
            fi
            echo "target_commit=$PREVIOUS_COMMIT" >> $GITHUB_OUTPUT
            echo "Rolling back to previous successful deployment: $PREVIOUS_COMMIT"
          fi

      - name: Execute PM2 rollback
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /opt/algo-trader
            TARGET_COMMIT="${{ steps.rollback_target.outputs.target_commit }}"

            echo "🔄 Starting rollback to: $TARGET_COMMIT"

            # Stop current application
            pm2 stop ecosystem.config.js || echo "Application already stopped"

            # Checkout target commit
            git checkout $TARGET_COMMIT

            # Install dependencies
            npm install --production

            # Build application
            npm run build

            # Start application with production environment
            pm2 start ecosystem.config.js --update-env --env production

            sleep 10

            # Verify application is running
            pm2 status

            # Health check
            MAX_ATTEMPTS=${{ github.event.inputs.max_rollback_attempts || 3 }}
            ATTEMPT=0
            while [ $ATTEMPT -lt $MAX_ATTEMPTS ]; do
              ATTEMPT=$((ATTEMPT + 1))
              if curl -sf http://localhost:3000/health; then
                echo "✅ Health check passed on attempt $ATTEMPT"
                break
              else
                echo "⏳ Health check failed on attempt $ATTEMPT, retrying..."
                sleep 5
              fi

              if [ $ATTEMPT -eq $MAX_ATTEMPTS ]; then
                echo "❌ Health check failed after $MAX_ATTEMPTS attempts"
                pm2 logs --lines 100
                exit 1
              fi
            done

            echo "✅ Rollback completed successfully to commit: $TARGET_COMMIT"

      - name: Notify rollback completion
        if: always()
        continue-on-error: true
        run: |
          STATUS="${{ job.status }}"
          EMOJI=$([[ "$STATUS" == "success" ]] && echo "✅" || echo "❌")
          MSG="$EMOJI Production Rollback $STATUS | Target: ${{ steps.rollback_target.outputs.target_commit }} | $(date -u +%H:%M)"
          if [ -n "${{ secrets.TG_BOT_TOKEN }}" ]; then
            curl -s "https://api.telegram.org/bot${{ secrets.TG_BOT_TOKEN }}/sendMessage" \
              -d "chat_id=${{ secrets.TG_CHAT_ID }}&text=$MSG&parse_mode=Markdown"
          fi

      - name: Generate rollback report
        run: |
          mkdir -p rollback-report
          cat > rollback-report/production-rollback-report.md << EOF
          # Production Rollback Report

          ## Rollback Information
          - Triggered by: ${{ github.actor }}
          - Environment: production
          - Target Commit: ${{ steps.rollback_target.outputs.target_commit }}
          - Rollback Time: $(date -u +"%Y-%m-%dT%H:%M:%SZ")
          - Status: ${{ job.status }}

          ## Actions Performed
          - Stopped current application
          - Checked out target commit
          - Reinstalled dependencies
          - Rebuilt application
          - Started application with production environment
          - Verified health check

          ## Next Steps
          - Monitor application metrics
          - Verify trading functionality
          - Investigate root cause of original issue
          EOF
          cat rollback-report/production-rollback-report.md

      - name: Upload rollback report
        uses: actions/upload-artifact@v4
        with:
          name: production-rollback-report
          path: rollback-report
          retention-days: 30

  rollback-staging:
    name: Rollback Staging
    runs-on: ubuntu-latest
    needs: [validate-inputs]
    if: github.event.inputs.environment == 'staging'
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - name: Determine rollback target
        id: rollback_target
        run: |
          if [ -n "${{ github.event.inputs.rollback_to_commit }}" ]; then
            echo "target_commit=${{ github.event.inputs.rollback_to_commit }}" >> $GITHUB_OUTPUT
            echo "Using specified commit: ${{ github.event.inputs.rollback_to_commit }}"
          else
            # Get previous successful deployment commit for staging
            PREVIOUS_COMMIT=$(git log --grep="✅ Staging deploy complete" -n 2 --pretty=format:"%H" | tail -n 1)
            if [ -z "$PREVIOUS_COMMIT" ]; then
              echo "❌ No previous successful staging deployment found"
              exit 1
            fi
            echo "target_commit=$PREVIOUS_COMMIT" >> $GITHUB_OUTPUT
            echo "Rolling back to previous successful staging deployment: $PREVIOUS_COMMIT"
          fi

      - name: Execute PM2 rollback
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.STAGING_VPS_HOST }}
          username: ${{ secrets.STAGING_VPS_USER }}
          key: ${{ secrets.STAGING_VPS_SSH_KEY }}
          script: |
            cd /opt/algo-trader-staging
            TARGET_COMMIT="${{ steps.rollback_target.outputs.target_commit }}"

            echo "🔄 Starting staging rollback to: $TARGET_COMMIT"

            # Stop current application
            pm2 stop ecosystem.config.js || echo "Application already stopped"

            # Checkout target commit
            git checkout $TARGET_COMMIT

            # Install dependencies
            npm install --production

            # Build application
            npm run build

            # Start application with staging environment
            pm2 start ecosystem.config.js --update-env --env staging

            sleep 10

            # Verify application is running
            pm2 status

            # Health check on staging port (3001)
            MAX_ATTEMPTS=${{ github.event.inputs.max_rollback_attempts || 3 }}
            ATTEMPT=0
            while [ $ATTEMPT -lt $MAX_ATTEMPTS ]; do
              ATTEMPT=$((ATTEMPT + 1))
              if curl -sf http://localhost:3001/health; then
                echo "✅ Health check passed on attempt $ATTEMPT"
                break
              else
                echo "⏳ Health check failed on attempt $ATTEMPT, retrying..."
                sleep 5
              fi

              if [ $ATTEMPT -eq $MAX_ATTEMPTS ]; then
                echo "❌ Health check failed after $MAX_ATTEMPTS attempts"
                pm2 logs --lines 100
                exit 1
              fi
            done

            echo "✅ Staging rollback completed successfully to commit: $TARGET_COMMIT"

      - name: Notify rollback completion
        if: always()
        continue-on-error: true
        run: |
          STATUS="${{ job.status }}"
          EMOJI=$([[ "$STATUS" == "success" ]] && echo "✅" || echo "❌")
          MSG="$EMOJI Staging Rollback $STATUS | Target: ${{ steps.rollback_target.outputs.target_commit }} | $(date -u +%H:%M)"
          if [ -n "${{ secrets.TG_BOT_TOKEN }}" ]; then
            curl -s "https://api.telegram.org/bot${{ secrets.TG_BOT_TOKEN }}/sendMessage" \
              -d "chat_id=${{ secrets.TG_CHAT_ID }}&text=$MSG&parse_mode=Markdown"
          fi

      - name: Generate rollback report
        run: |
          mkdir -p rollback-report
          cat > rollback-report/staging-rollback-report.md << EOF
          # Staging Rollback Report

          ## Rollback Information
          - Triggered by: ${{ github.actor }}
          - Environment: staging
          - Target Commit: ${{ steps.rollback_target.outputs.target_commit }}
          - Rollback Time: $(date -u +"%Y-%m-%dT%H:%M:%SZ")
          - Status: ${{ job.status }}

          ## Actions Performed
          - Stopped current application
          - Checked out target commit
          - Reinstalled dependencies
          - Rebuilt application
          - Started application with staging environment
          - Verified health check on port 3001

          ## Next Steps
          - Monitor staging metrics
          - Test functionality before promoting to production
          - Investigate root cause of original issue
          EOF
          cat rollback-report/staging-rollback-report.md

      - name: Upload rollback report
        uses: actions/upload-artifact@v4
        with:
          name: staging-rollback-report
          path: rollback-report
          retention-days: 30

  post-rollback-validation:
    name: Post-Rollback Validation
    runs-on: ubuntu-latest
    needs: [rollback-production, rollback-staging]
    if: always() && (needs.rollback-production.result == 'success' || needs.rollback-staging.result == 'success')
    steps:
      - name: Validate rollback success
        run: |
          echo "🔍 Performing post-rollback validation..."

          # Check if any rollback succeeded
          if [[ "${{ needs.rollback-production.result }}" == "success" || "${{ needs.rollback-staging.result }}" == "success" ]]; then
            echo "✅ Rollback validation passed - at least one environment successfully rolled back"
          else
            echo "❌ Both rollback attempts failed"
            exit 1
          fi

      - name: Create comprehensive validation report
        run: |
          mkdir -p comprehensive-validation
          cat > comprehensive-validation/rollback-validation.md << EOF
          # Comprehensive Rollback Validation Report

          ## Environment Status
          - Production Rollback: ${{ needs.rollback-production.result }}
          - Staging Rollback: ${{ needs.rollback-staging.result }}

          ## Validation Summary
          At least one environment was successfully rolled back.
          Please verify the specific environment reports for detailed information.

          ## Recommendations
          - If production rollback succeeded, monitor trading performance closely
          - If staging rollback succeeded, use it for testing before next production deploy
          - Investigate the root cause that necessitated the rollback
          - Consider implementing additional safeguards to prevent similar issues
          EOF
          cat comprehensive-validation/rollback-validation.md

      - name: Upload comprehensive validation report
        uses: actions/upload-artifact@v4
        with:
          name: comprehensive-rollback-validation
          path: comprehensive-validation
          retention-days: 30