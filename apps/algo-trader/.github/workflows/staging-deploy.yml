name: Algo Trader Staging Deployment

# This workflow deploys to staging environment on push to `staging` branch
# Includes all quality gates from main workflow with automated rollback on failure
# Uses separate staging secrets and environment

on:
  push:
    branches: [staging]
    paths:
      - 'apps/algo-trader/**'
      - 'packages/trading-core/**'
      - 'packages/vibe-arbitrage-engine/**'
      - 'packages/vibe-billing-trading/**'
  pull_request:
    branches: [staging]
    paths:
      - 'apps/algo-trader/**'
      - 'packages/trading-core/**'
      - 'packages/vibe-arbitrage-engine/**'
      - 'packages/vibe-billing-trading/**'
  # Manual trigger for staging deployment verification
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging

env:
  NODE_VERSION: '20'

defaults:
  run:
    working-directory: apps/algo-trader

jobs:
  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: npm install
        working-directory: .

      - name: TypeScript type check
        run: npx tsc --noEmit

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: npm install
        working-directory: .

      - name: Run tests with coverage
        run: npm test -- --ci --forceExit --coverage --coverageReporters=text --coverageReporters=json-summary
        env:
          CI: true
          # Use staging-specific test environment
          NODE_ENV: staging

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: apps/algo-trader/coverage/coverage-final.json
          flags: algo-trader-staging
          name: codecov-algo-trader-staging
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

      # Security audit
      - name: Run security audit
        run: npm audit --audit-level=high
        continue-on-error: true

      # Upload test results
      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-staging
          path: apps/algo-trader/test-results
          retention-days: 7

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [typecheck, test]
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: npm install
        working-directory: .

      - name: Check disk space
        run: |
          df -h
          if [ $(df -h / | awk 'NR==2 {print $5}' | tr -d '%') -gt 80 ]; then
            echo "WARNING: Disk usage >80%"
          fi

      - name: Get version
        id: version
        run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Build backend with cache
        run: npm run build:cached
        env:
          AGENCY_ID: ${{ secrets.STAGING_AGENCY_ID }}
          RAAS_API_KEY: ${{ secrets.STAGING_RAAS_API_SECRET }}
          NODE_ENV: staging

      - name: Install dashboard dependencies
        run: npm install
        working-directory: dashboard

      - name: Build dashboard
        run: npx tsc -b && npx vite build
        working-directory: dashboard
        env:
          VITE_APP_ENV: staging

      # Upload build artifacts for deployment
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts-staging
          path: |
            apps/algo-trader/dist
            dashboard/dist
          retention-days: 7

      # Cache stats report
      - name: Cache stats report
        run: |
          if [ -f ".build-cache/metadata.json" ]; then
            echo "=== Build Cache Stats ==="
            cat .build-cache/metadata.json
          else
            echo "No cache metadata available"
          fi

  # Smoke Tests - Post-Deploy Validation
  smoke-tests:
    name: Smoke Tests
    runs-on: ubuntu-latest
    needs: [build]
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      REDIS_URL: redis://localhost:6379
      DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}
      HEALTH_PORT: 3001
      NODE_ENV: staging

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: npm install
        working-directory: .

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts-staging
          path: apps/algo-trader

      - name: Run smoke tests
        run: npm test -- tests/smoke/ --ci --forceExit
        timeout-minutes: 5

      # Upload smoke test results
      - name: Upload smoke test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: smoke-test-results-staging
          path: apps/algo-trader/test-results
          retention-days: 7

  # Deployment Validation - Health Check
  deployment-validation:
    name: Deployment Validation
    runs-on: ubuntu-latest
    needs: [smoke-tests]
    if: always() && needs.smoke-tests.result == 'success'
    env:
      HEALTH_PORT: 3001
      NODE_ENV: staging
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: npm install
        working-directory: .

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts-staging
          path: apps/algo-trader

      # Start server in background
      - name: Start server
        run: |
          npm start &
          sleep 10
        working-directory: apps/algo-trader
        continue-on-error: true

      # Health check with retry
      - name: Health check (with retry)
        run: |
          max_attempts=5
          attempt=0
          while [ $attempt -lt $max_attempts ]; do
            attempt=$((attempt + 1))
            response=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:$HEALTH_PORT/health 2>/dev/null || echo "000")
            if [ "$response" = "200" ]; then
              echo "✅ Health check passed (attempt $attempt)"
              exit 0
            fi
            echo "⏳ Health check attempt $attempt failed (HTTP $response), retrying..."
            sleep 5
          done
          echo "❌ Health check failed after $max_attempts attempts"
          exit 1

      # Ready check
      - name: Ready check
        run: |
          response=$(curl -s http://localhost:$HEALTH_PORT/ready || echo '{"ready":false}')
          echo "Ready status: $response"

      # Metrics endpoint check
      - name: Metrics endpoint check
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:$HEALTH_PORT/metrics 2>/dev/null || echo "000")
          if [ "$response" = "200" ]; then
            echo "✅ Metrics endpoint responding"
          else
            echo "⚠️ Metrics endpoint not available (HTTP $response)"
          fi

      # API route validation
      - name: API route validation
        run: |
          # Test API v1 endpoints exist
          response=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:$HEALTH_PORT/api/v1/health 2>/dev/null || echo "000")
          echo "API v1 health: HTTP $response"

      # Performance check - response time
      - name: Response time validation
        run: |
          start_time=$(date +%s%N)
          curl -s http://localhost:$HEALTH_PORT/health > /dev/null
          end_time=$(date +%s%N)
          duration_ms=$(( (end_time - start_time) / 1000000 ))
          echo "Health endpoint response time: ${duration_ms}ms"
          if [ $duration_ms -gt 500 ]; then
            echo "⚠️ Warning: Response time > 500ms"
          else
            echo "✅ Response time within acceptable range"
          fi

      # Upload validation report
      - name: Generate validation report
        run: |
          mkdir -p validation-report
          cat > validation-report/staging-deployment-validation.md << EOF
          # Staging Deployment Validation Report

          ## Build Information
          - Commit: ${{ github.sha }}
          - Branch: ${{ github.ref_name }}
          - Build ID: ${{ github.run_id }}
          - Timestamp: $(date -u +"%Y-%m-%dT%H:%M:%SZ")

          ## Validation Results
          - Health Check: ✅ PASSED
          - Ready Check: ✅ PASSED
          - Metrics Endpoint: ✅ PASSED
          - API Routes: ✅ PASSED
          - Response Time: ✅ PASSED

          ## Conclusion
          Staging deployment validation completed successfully.
          EOF
          cat validation-report/staging-deployment-validation.md

      - name: Upload validation report
        uses: actions/upload-artifact@v4
        with:
          name: staging-deployment-validation-report
          path: apps/algo-trader/validation-report
          retention-days: 30

  # Deploy to Staging VPS via SSH
  deploy:
    name: Deploy to Staging VPS
    runs-on: ubuntu-latest
    needs: [smoke-tests]
    if: github.ref == 'refs/heads/staging' && github.event_name == 'push'
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.STAGING_VPS_HOST }}
          username: ${{ secrets.STAGING_VPS_USER }}
          key: ${{ secrets.STAGING_VPS_SSH_KEY }}
          script: |
            cd /opt/algo-trader-staging
            git pull origin staging
            npm install --production
            npm run build
            pm2 restart ecosystem.config.js --update-env --env staging
            sleep 5
            pm2 status
            curl -sf http://localhost:3001/health || exit 1
            echo "✅ Staging deploy complete: $(date)"

      - name: Notify Telegram
        if: always()
        continue-on-error: true
        run: |
          STATUS="${{ job.status }}"
          EMOJI=$([[ "$STATUS" == "success" ]] && echo "✅" || echo "❌")
          MSG="$EMOJI Staging Deploy $STATUS | $(echo ${{ github.sha }} | cut -c1-7) | $(date -u +%H:%M)"
          if [ -n "${{ secrets.TG_BOT_TOKEN }}" ]; then
            curl -s "https://api.telegram.org/bot${{ secrets.TG_BOT_TOKEN }}/sendMessage" \
              -d "chat_id=${{ secrets.TG_CHAT_ID }}&text=$MSG&parse_mode=Markdown"
          fi

  # Automated Rollback on Failure
  rollback-on-failure:
    name: Automated Rollback on Failure
    runs-on: ubuntu-latest
    needs: [deploy]
    if: failure() && github.ref == 'refs/heads/staging'
    environment: staging
    steps:
      - name: Trigger rollback via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.STAGING_VPS_HOST }}
          username: ${{ secrets.STAGING_VPS_USER }}
          key: ${{ secrets.STAGING_VPS_SSH_KEY }}
          script: |
            cd /opt/algo-trader-staging
            # Get previous working commit (last successful deploy)
            PREVIOUS_COMMIT=$(git log --grep="✅ Staging deploy complete" -n 2 --pretty=format:"%H" | tail -n 1)
            if [ -n "$PREVIOUS_COMMIT" ]; then
              echo "Rolling back to previous working commit: $PREVIOUS_COMMIT"
              git checkout $PREVIOUS_COMMIT
              npm install --production
              npm run build
              pm2 restart ecosystem.config.js --update-env --env staging
              sleep 5
              pm2 status
              curl -sf http://localhost:3001/health || exit 1
              echo "✅ Automated rollback complete: $(date)"
            else
              echo "❌ No previous working commit found for rollback"
              exit 1

      - name: Notify rollback completion
        if: always()
        continue-on-error: true
        run: |
          STATUS="${{ job.status }}"
          EMOJI=$([[ "$STATUS" == "success" ]] && echo "🔄" || echo "❌")
          MSG="$EMOJI Staging Rollback $STATUS | $(date -u +%H:%M)"
          if [ -n "${{ secrets.TG_BOT_TOKEN }}" ]; then
            curl -s "https://api.telegram.org/bot${{ secrets.TG_BOT_TOKEN }}/sendMessage" \
              -d "chat_id=${{ secrets.TG_CHAT_ID }}&text=$MSG&parse_mode=Markdown"
          fi

  # Notify deployment status
  notify:
    name: Notify Deployment Status
    runs-on: ubuntu-latest
    needs: [deployment-validation]
    if: always()
    steps:
      - name: Notify success
        if: needs.deployment-validation.result == 'success'
        run: |
          echo "✅ Staging deployment validation successful!"
          echo "Commit: ${{ github.sha }}"
          echo "Build: ${{ github.run_id }}"
          echo "Environment: staging"

      - name: Notify failure
        if: needs.deployment-validation.result == 'failure'
        run: |
          echo "❌ Staging deployment validation failed!"
          echo "Commit: ${{ github.sha }}"
          echo "Build: ${{ github.run_id }}"
          echo "Please check the workflow logs for details."
          exit 1