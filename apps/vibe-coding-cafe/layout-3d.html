<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIBE CODING — 3D Layout | 10×40m</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        body {
            background: #060a13;
            overflow: hidden;
            font-family: 'Segoe UI', sans-serif
        }

        canvas {
            display: block
        }

        #ui {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            pointer-events: none;
            z-index: 10
        }

        #header {
            text-align: center;
            padding: 16px;
            background: linear-gradient(180deg, rgba(6, 10, 19, 0.95), transparent)
        }

        #header h1 {
            font-size: 1.3rem;
            font-weight: 700;
            color: #e4e8f1
        }

        #header h1 span {
            color: #00e5ff;
            text-shadow: 0 0 15px rgba(0, 229, 255, 0.4)
        }

        #header p {
            font-size: 0.75rem;
            color: #8892a6;
            margin-top: 2px
        }

        #controls {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 8px;
            pointer-events: all;
            z-index: 10
        }

        #controls button {
            padding: 8px 18px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.12);
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(10px);
            color: #e4e8f1;
            font-size: 0.75rem;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 500
        }

        #controls button:hover,
        #controls button.active {
            border-color: #00e5ff;
            color: #00e5ff;
            background: rgba(0, 229, 255, 0.1)
        }

        #legend {
            position: fixed;
            top: 70px;
            right: 16px;
            display: flex;
            flex-direction: column;
            gap: 6px;
            pointer-events: all;
            z-index: 10
        }

        .leg {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.68rem;
            color: #8892a6;
            padding: 4px 10px;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(8px);
            border-radius: 6px;
            border: 1px solid rgba(255, 255, 255, 0.06)
        }

        .leg-dot {
            width: 10px;
            height: 10px;
            border-radius: 3px;
            flex-shrink: 0
        }

        #info {
            position: fixed;
            bottom: 20px;
            right: 16px;
            font-size: 0.65rem;
            color: #4a5066;
            pointer-events: none;
            z-index: 10;
            text-align: right
        }

        #tooltip {
            position: fixed;
            display: none;
            padding: 8px 14px;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 229, 255, 0.3);
            border-radius: 8px;
            color: #e4e8f1;
            font-size: 0.75rem;
            pointer-events: none;
            z-index: 20;
            max-width: 220px
        }

        #tooltip .tt-title {
            font-weight: 700;
            color: #00e5ff;
            margin-bottom: 2px
        }

        #tooltip .tt-desc {
            color: #8892a6;
            font-size: 0.7rem
        }
    </style>
</head>

<body>
    <div id="ui">
        <div id="header">
            <h1>VIBE <span>CODING</span> — 3D Layout</h1>
            <p>10m × 40m • 91 Hùng Vương, Sa Đéc • Kéo chuột để xoay, scroll để zoom</p>
        </div>
    </div>
    <div id="controls">
        <button class="active" onclick="setView('aerial')">🛩️ Trên cao</button>
        <button onclick="setView('front')">🏪 Mặt tiền</button>
        <button onclick="setView('side')">📐 Bên hông</button>
        <button onclick="setView('back')">🅿️ Bãi đỗ xe</button>
        <button onclick="setView('rooftop')">☁️ Rooftop</button>
        <button onclick="toggleLabels()">🏷️ Nhãn</button>
    </div>
    <div id="legend">
        <div class="leg">
            <div class="leg-dot" style="background:#4FC3F7"></div>Coding Zone (40ft)
        </div>
        <div class="leg">
            <div class="leg-dot" style="background:#F48FB1"></div>Meeting Room (20ft)
        </div>
        <div class="leg">
            <div class="leg-dot" style="background:#FFE082"></div>Café Bar (20ft)
        </div>
        <div class="leg">
            <div class="leg-dot" style="background:#A1887F"></div>Outdoor Terrace
        </div>
        <div class="leg">
            <div class="leg-dot" style="background:#81C784"></div>Vườn cây
        </div>
        <div class="leg">
            <div class="leg-dot" style="background:#9E9E9E"></div>Bãi đậu xe
        </div>
        <div class="leg">
            <div class="leg-dot" style="background:#E0E0E0"></div>Lối xe 1.5m
        </div>
    </div>
    <div id="info">Tỷ lệ 1:1 • Three.js r160</div>
    <div id="tooltip">
        <div class="tt-title"></div>
        <div class="tt-desc"></div>
    </div>

    <script type="importmap">
{"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js","three/addons/":"https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"}}
</script>
    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x060a13);
        scene.fog = new THREE.FogExp2(0x060a13, 0.012);

        const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 200);
        camera.position.set(18, 22, 20);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.2;
        document.body.appendChild(renderer.domElement);

        const labelRenderer = new CSS2DRenderer();
        labelRenderer.setSize(window.innerWidth, window.innerHeight);
        labelRenderer.domElement.style.position = 'absolute';
        labelRenderer.domElement.style.top = '0';
        labelRenderer.domElement.style.pointerEvents = 'none';
        document.body.appendChild(labelRenderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.08;
        controls.target.set(5, 2, 20);
        controls.minDistance = 5;
        controls.maxDistance = 60;
        controls.maxPolarAngle = Math.PI / 2.05;

        // Lights
        const amb = new THREE.AmbientLight(0x334466, 0.6);
        scene.add(amb);
        const sun = new THREE.DirectionalLight(0xffeedd, 1.8);
        sun.position.set(15, 25, -10);
        sun.castShadow = true;
        sun.shadow.mapSize.set(2048, 2048);
        sun.shadow.camera.left = -25; sun.shadow.camera.right = 25;
        sun.shadow.camera.top = 45; sun.shadow.camera.bottom = -5;
        scene.add(sun);
        const fill = new THREE.DirectionalLight(0x88aaff, 0.4);
        fill.position.set(-10, 15, 30);
        scene.add(fill);
        // Cyan accent light
        const accent = new THREE.PointLight(0x00e5ff, 1, 15);
        accent.position.set(1.2, 3, 3);
        scene.add(accent);

        // Materials
        const matGround = new THREE.MeshStandardMaterial({ color: 0x2a2a2a, roughness: 0.9 });
        const matConcrete = new THREE.MeshStandardMaterial({ color: 0xcccccc, roughness: 0.7 });
        const matCoding = new THREE.MeshStandardMaterial({ color: 0x0288D1, roughness: 0.3, metalness: 0.4 });
        const matMeeting = new THREE.MeshStandardMaterial({ color: 0xE91E63, roughness: 0.3, metalness: 0.4 });
        const matCafe = new THREE.MeshStandardMaterial({ color: 0xFF8F00, roughness: 0.3, metalness: 0.4 });
        const matGlass = new THREE.MeshPhysicalMaterial({ color: 0xaaddff, transparent: true, opacity: 0.25, roughness: 0.05, metalness: 0.1, transmission: 0.7 });
        const matTerrace = new THREE.MeshStandardMaterial({ color: 0x8D6E63, roughness: 0.8 });
        const matGarden = new THREE.MeshStandardMaterial({ color: 0x4CAF50, roughness: 0.9 });
        const matParking = new THREE.MeshStandardMaterial({ color: 0x757575, roughness: 0.85 });
        const matDriveway = new THREE.MeshStandardMaterial({ color: 0x9E9E9E, roughness: 0.8 });
        const matRoof = new THREE.MeshStandardMaterial({ color: 0x455A64, roughness: 0.5, metalness: 0.6 });
        const matRailing = new THREE.MeshStandardMaterial({ color: 0x37474F, roughness: 0.3, metalness: 0.7 });
        const matNeon = new THREE.MeshStandardMaterial({ color: 0x00e5ff, emissive: 0x00e5ff, emissiveIntensity: 2, roughness: 0.1 });
        const matTree = new THREE.MeshStandardMaterial({ color: 0x2E7D32, roughness: 0.9 });
        const matTrunk = new THREE.MeshStandardMaterial({ color: 0x5D4037, roughness: 0.9 });
        const matStreet = new THREE.MeshStandardMaterial({ color: 0x333333, roughness: 0.9 });

        const objects = [];
        const labels = [];
        let labelsVisible = true;

        function addLabel(text, pos, col = '#00e5ff') {
            const div = document.createElement('div');
            div.style.cssText = `font-size:11px;font-weight:700;color:${col};text-shadow:0 0 8px ${col}40,0 1px 3px #000;font-family:sans-serif;white-space:nowrap`;
            div.textContent = text;
            const lbl = new CSS2DObject(div);
            lbl.position.copy(pos);
            scene.add(lbl);
            labels.push(lbl);
            return lbl;
        }

        function box(w, h, d, mat, x, y, z, name, desc) {
            const g = new THREE.BoxGeometry(w, h, d);
            const m = new THREE.Mesh(g, mat);
            m.position.set(x, y, z);
            m.castShadow = true;
            m.receiveShadow = true;
            if (name) { m.userData = { name, desc }; }
            scene.add(m);
            objects.push(m);
            return m;
        }

        // === GROUND PLANE (grass) ===
        const groundG = new THREE.PlaneGeometry(50, 60);
        const ground = new THREE.Mesh(groundG, new THREE.MeshStandardMaterial({ color: 0x1a3a1a, roughness: 0.95 }));
        ground.rotation.x = -Math.PI / 2;
        ground.position.set(5, 0, 20);
        ground.receiveShadow = true;
        scene.add(ground);

        // === STREET ===
        box(14, 0.05, 4, matStreet, 5, -0.02, -1.5, 'Đường Hùng Vương', 'Mặt tiền 10m hướng ra đường');

        // === LOT CONCRETE PAD ===
        box(10, 0.1, 40, matConcrete, 5, 0.05, 20, 'Mặt bằng', '10m × 40m = 400m²');

        // ===  DRIVEWAY — right side, 1.5m wide, full length ===
        box(1.5, 0.12, 40, matDriveway, 9.25, 0.07, 20, 'Lối xe', '1.5m rộng — nối đường Hùng Vương tới bãi đỗ xe cuối lô');
        // Driveway lines
        for (let z = 2; z < 39; z += 3) {
            const line = box(0.08, 0.13, 1, new THREE.MeshStandardMaterial({ color: 0xeeeeee, roughness: 0.5 }), 9.25, 0.13, z);
        }

        // === 40ft CONTAINER — CODING ZONE (lengthwise on left) ===
        // 2.44m wide × 12.19m long × 2.9m tall, positioned at left front
        const codingX = 1.22 + 0.2; // left side + margin
        const codingZ = 0.5 + 12.19 / 2; // from front
        box(2.44, 2.9, 12.19, matCoding, codingX, 1.55, codingZ, 'CODING ZONE', 'Container 40ft · 2.44m × 12.19m\n8 bàn communal, ổ cắm USB-C\nDesks dọc hai bên');
        addLabel('CODING ZONE', new THREE.Vector3(codingX, 3.8, codingZ), '#4FC3F7');

        // Glass front (facing street)
        box(2.2, 2.2, 0.05, matGlass, codingX, 1.5, 0.53, 'Cửa kính', 'Cửa kính cường lực 10mm sliding');
        // Windows along right side (facing terrace)
        for (let i = 0; i < 4; i++) {
            box(0.05, 1.2, 1.2, matGlass, codingX + 1.23, 1.8, 2 + i * 2.8);
        }
        // Windows along left side
        for (let i = 0; i < 3; i++) {
            box(0.05, 1.2, 1.0, matGlass, codingX - 1.23, 1.8, 3 + i * 3.5);
        }

        // === ROOFTOP DECK (on top of 40ft) ===
        box(2.8, 0.1, 12.5, matTerrace, codingX, 3.05, codingZ, 'ROOFTOP DECK', 'Tầng 2 trên container 40ft\nMái che + lan can + view garden');
        addLabel('ROOFTOP ↑', new THREE.Vector3(codingX, 3.8, codingZ - 3), '#ff00ff');

        // Roof canopy
        box(3.0, 0.06, 13, matRoof, codingX, 4.2, codingZ);
        // Roof supports
        for (let i = 0; i < 4; i++) {
            box(0.08, 1.1, 0.08, matRailing, codingX - 1.3, 3.65, 1.5 + i * 3.5);
            box(0.08, 1.1, 0.08, matRailing, codingX + 1.3, 3.65, 1.5 + i * 3.5);
        }
        // Railing posts
        for (let i = 0; i < 8; i++) {
            box(0.05, 1.1, 0.05, matRailing, codingX + 1.35, 3.6, 1 + i * 1.5);
            box(0.05, 1.1, 0.05, matRailing, codingX - 1.35, 3.6, 1 + i * 1.5);
        }
        // Top railing bar
        box(0.04, 0.04, 12, matRailing, codingX + 1.35, 4.1, codingZ);
        box(0.04, 0.04, 12, matRailing, codingX - 1.35, 4.1, codingZ);

        // === STAIRCASE ===
        const stairX = codingX + 1.5;
        const stairZ = 12;
        for (let i = 0; i < 8; i++) {
            box(0.8, 0.17, 0.3, matConcrete, stairX, 0.3 + i * 0.35, stairZ + i * 0.15, 'Cầu thang', 'Lên tầng 2 rooftop\nBậc 17cm, rộng 90cm');
        }

        // === OUTDOOR TERRACE (right of 40ft container) ===
        const terraceX = (codingX + 1.22 + 8.5) / 2;
        const terraceW = 8.5 - (codingX + 1.22);
        box(terraceW, 0.12, 12.19, matTerrace, terraceX + 0.6, 0.11, codingZ, 'OUTDOOR TERRACE', 'Sàn gỗ composite WPC\nBàn tròn + ghế ngoài trời');
        addLabel('OUTDOOR TERRACE', new THREE.Vector3(terraceX + 0.6, 1.5, codingZ - 2), '#A1887F');

        // Tables on terrace
        const tableMat = new THREE.MeshStandardMaterial({ color: 0xBCAAA4, roughness: 0.6 });
        for (let row = 0; row < 3; row++) {
            for (let col = 0; col < 2; col++) {
                const tx = 3.5 + col * 2.2;
                const tz = 2 + row * 3.5;
                // Table
                const tg = new THREE.CylinderGeometry(0.4, 0.4, 0.04, 16);
                const tm = new THREE.Mesh(tg, tableMat);
                tm.position.set(tx, 0.85, tz);
                tm.castShadow = true;
                scene.add(tm);
                // Table leg
                box(0.06, 0.7, 0.06, matRailing, tx, 0.45, tz);
                // Chairs
                for (let c = 0; c < 3; c++) {
                    const angle = (c / 3) * Math.PI * 2 + row;
                    const cx = tx + Math.cos(angle) * 0.65;
                    const cz = tz + Math.sin(angle) * 0.65;
                    const cg = new THREE.CylinderGeometry(0.15, 0.15, 0.04, 8);
                    const cm = new THREE.Mesh(cg, new THREE.MeshStandardMaterial({ color: 0x5D4037 }));
                    cm.position.set(cx, 0.5, cz);
                    scene.add(cm);
                }
            }
        }

        // === MEETING ROOM — 20ft Container ===
        const meetX = codingX;
        const meetZ = 13.5 + 6.06 / 2;
        box(2.44, 2.59, 6.06, matMeeting, meetX, 1.4, meetZ, 'MEETING ROOM', 'Container 20ft · 2.44m × 6.06m\nBàn họp 6 người, TV 65"');
        addLabel('MEETING', new THREE.Vector3(meetX, 3.2, meetZ), '#F48FB1');
        // Glass front
        box(2.2, 1.8, 0.05, matGlass, meetX, 1.5, meetZ - 3.04);
        // Door to terrace
        box(0.05, 2.0, 0.8, matGlass, meetX + 1.23, 1.4, meetZ - 1);

        // === CAFÉ BAR — 20ft Container ===
        const cafeX = meetX + 2.7;
        const cafeZ = meetZ;
        box(2.44, 2.59, 6.06, matCafe, cafeX, 1.4, cafeZ, 'CAFÉ BAR', 'Container 20ft · 2.44m × 6.06m\nQuầy bar chữ L, máy espresso\nPOS + Menu board');
        addLabel('CAFÉ BAR', new THREE.Vector3(cafeX, 3.2, cafeZ), '#FFE082');
        // Open counter toward terrace
        box(0.05, 1.5, 2, matGlass, cafeX + 1.23, 1.3, cafeZ);
        // Bar counter visible
        box(2.0, 0.9, 0.15, new THREE.MeshStandardMaterial({ color: 0x5D4037, roughness: 0.5 }), cafeX, 0.55, cafeZ + 2.5);

        // === TERRACE EXTENSION (below containers) ===
        box(7, 0.12, 5, matTerrace, 4, 0.11, 22, 'TERRACE MỞ RỘNG', 'Khu vực ngồi ngoài trời mở rộng');
        // More tables
        for (let i = 0; i < 3; i++) {
            const tg = new THREE.CylinderGeometry(0.35, 0.35, 0.04, 16);
            const tm = new THREE.Mesh(tg, tableMat);
            tm.position.set(2 + i * 2.5, 0.85, 22);
            tm.castShadow = true;
            scene.add(tm);
            box(0.06, 0.7, 0.06, matRailing, 2 + i * 2.5, 0.45, 22);
        }

        // === GARDEN ===
        box(7, 0.08, 7, new THREE.MeshStandardMaterial({ color: 0x33691E, roughness: 0.95 }), 4, 0.05, 28.5, 'VƯỜN CÂY XANH', 'Cây nhiệt đới, võng, kho chứa');
        addLabel('🌿 GARDEN', new THREE.Vector3(4, 2, 28.5), '#81C784');

        // Trees
        function addTree(x, z, h, r) {
            const trunk = new THREE.CylinderGeometry(0.08, 0.12, h * 0.6, 8);
            const tm = new THREE.Mesh(trunk, matTrunk);
            tm.position.set(x, h * 0.3, z);
            tm.castShadow = true;
            scene.add(tm);
            const crown = new THREE.SphereGeometry(r, 8, 6);
            const cm = new THREE.Mesh(crown, matTree);
            cm.position.set(x, h * 0.7, z);
            cm.castShadow = true;
            scene.add(cm);
        }
        addTree(1.5, 26, 3, 1.2);
        addTree(3.5, 27.5, 2.5, 1);
        addTree(6, 28, 3.5, 1.4);
        addTree(2, 30, 2, 0.8);
        addTree(5, 31, 2.8, 1.1);
        addTree(7, 29.5, 2.2, 0.9);
        addTree(1, 32, 3, 1.3);
        addTree(4.5, 29, 1.8, 0.7);

        // Hammock area
        box(0.1, 1.2, 0.1, matTrunk, 2.5, 0.6, 30.5);
        box(0.1, 1.2, 0.1, matTrunk, 4.5, 0.6, 30.5);

        // Storage shed
        box(2, 1.8, 1.5, new THREE.MeshStandardMaterial({ color: 0x616161, roughness: 0.7 }), 1.5, 1, 32, 'Kho chứa', 'Kho vật tư + dụng cụ');

        // === PARKING ===
        box(10, 0.08, 7, matParking, 5, 0.05, 36.5, 'BÃI ĐẬU XE', '26 chỗ xe máy · 2 hàng\nLối đi 3m giữa');
        addLabel('🅿️ PARKING', new THREE.Vector3(5, 1.5, 36.5), '#9E9E9E');

        // Parking lines
        for (let i = 0; i < 13; i++) {
            // Top row
            box(0.6, 0.09, 0.04, new THREE.MeshStandardMaterial({ color: 0xeeeeee }), 0.8 + i * 0.7, 0.1, 34.5);
            // Bottom row
            box(0.6, 0.09, 0.04, new THREE.MeshStandardMaterial({ color: 0xeeeeee }), 0.8 + i * 0.7, 0.1, 38.5);
        }
        // Lane marking
        box(8, 0.09, 0.06, new THREE.MeshStandardMaterial({ color: 0xffcc00 }), 5, 0.1, 36.5);

        // === NEON SIGN at front ===
        addLabel('⚡ VIBE CODING', new THREE.Vector3(5, 4, 0.2), '#00e5ff');
        // Neon bar
        box(3, 0.15, 0.08, matNeon, 5, 3.5, 0.3);
        box(0.08, 0.15, 0.08, new THREE.MeshStandardMaterial({ color: 0xff00ff, emissive: 0xff00ff, emissiveIntensity: 1.5 }), 6.8, 3.5, 0.3);

        // === LOT BOUNDARY markers (subtle posts at corners) ===
        const postMat = new THREE.MeshStandardMaterial({ color: 0x888888, metalness: 0.5, roughness: 0.4 });
        box(0.1, 1, 0.1, postMat, 0, 0.5, 0);
        box(0.1, 1, 0.1, postMat, 10, 0.5, 0);
        box(0.1, 1, 0.1, postMat, 0, 0.5, 40);
        box(0.1, 1, 0.1, postMat, 10, 0.5, 40);

        // === CCTV Cameras ===
        function addCamera(x, y, z) {
            box(0.2, 0.15, 0.15, new THREE.MeshStandardMaterial({ color: 0x212121 }), x, y, z);
            box(0.08, 0.08, 0.2, new THREE.MeshStandardMaterial({ color: 0x333333 }), x, y, z - 0.15);
        }
        addCamera(0.3, 3, 0.3);
        addCamera(8, 3, 10);
        addCamera(0.3, 2, 25);
        addCamera(9.5, 2, 34);

        // ===== RAYCASTING for tooltips =====
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        const tooltip = document.getElementById('tooltip');

        renderer.domElement.addEventListener('mousemove', (e) => {
            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);
            const hits = raycaster.intersectObjects(objects);
            if (hits.length > 0 && hits[0].object.userData.name) {
                const d = hits[0].object.userData;
                tooltip.style.display = 'block';
                tooltip.style.left = (e.clientX + 15) + 'px';
                tooltip.style.top = (e.clientY - 10) + 'px';
                tooltip.querySelector('.tt-title').textContent = d.name;
                tooltip.querySelector('.tt-desc').textContent = d.desc || '';
            } else {
                tooltip.style.display = 'none';
            }
        });

        // ===== CAMERA VIEWS =====
        const views = {
            aerial: { pos: [18, 22, 20], target: [5, 2, 20] },
            front: { pos: [5, 4, -6], target: [5, 2, 6] },
            side: { pos: [-8, 6, 15], target: [3, 2, 15] },
            back: { pos: [5, 5, 46], target: [5, 1, 36] },
            rooftop: { pos: [1.4, 6, 4], target: [1.4, 3, 8] }
        };

        window.setView = function (name) {
            const v = views[name];
            if (!v) return;
            document.querySelectorAll('#controls button').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            const start = { px: camera.position.x, py: camera.position.y, pz: camera.position.z, tx: controls.target.x, ty: controls.target.y, tz: controls.target.z };
            const end = { px: v.pos[0], py: v.pos[1], pz: v.pos[2], tx: v.target[0], ty: v.target[1], tz: v.target[2] };
            let t = 0;
            const dur = 60;
            function animView() {
                t++;
                const p = 1 - Math.pow(1 - t / dur, 3);
                camera.position.set(start.px + (end.px - start.px) * p, start.py + (end.py - start.py) * p, start.pz + (end.pz - start.pz) * p);
                controls.target.set(start.tx + (end.tx - start.tx) * p, start.ty + (end.ty - start.ty) * p, start.tz + (end.tz - start.tz) * p);
                if (t < dur) requestAnimationFrame(animView);
            }
            animView();
        };

        window.toggleLabels = function () {
            labelsVisible = !labelsVisible;
            labels.forEach(l => { l.element.style.display = labelsVisible ? '' : 'none' });
        };

        // ===== ANIMATION =====
        const clock = new THREE.Clock();
        function animate() {
            requestAnimationFrame(animate);
            const t = clock.getElapsedTime();
            // Subtle neon pulse
            accent.intensity = 1 + Math.sin(t * 2) * 0.3;
            controls.update();
            renderer.render(scene, camera);
            labelRenderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            labelRenderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>

</html>
