[pretix]
instance_name=VIBE CODING Café
url=https://events.vibecafe.vn
currency=VND
datadir=/var/pretix/data

[database]
backend=postgresql
name=pretix
user=${PG_USER}
password=${PG_PASS}
host=postgres
port=5432

[mail]
from=no-reply@vibecafe.vn
host=smtp.gmail.com
port=587
user=${SMTP_USER}
password=${SMTP_PASS}
tls=on

[redis]
location=redis://:${REDIS_PASS}@redis:6379/1
