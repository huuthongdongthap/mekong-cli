name = "raas-gateway"
main = "index.js"
compatibility_date = "2024-02-06"
account_id = "f691e83094f776311a1bfe3f8b126f1c"
workers_dev = true
# Custom domain: raas.agencyos.network (set via CF Dashboard or DNS CNAME)

[vars]
OPENCLAW_URL = ""
DEFAULT_MODEL = "vertexai/gemini-1.5-pro-preview-0514"
BACKEND_URL = ""

# KV namespace for rate limiting counters (TTL-based sliding window)
# Create with: wrangler kv:namespace create "RATE_LIMIT_KV"
# Then replace id below with the output id
[[kv_namespaces]]
binding = "RATE_LIMIT_KV"
id = "982a12a5ea414244988a51d743eb14e7"
preview_id = "982a12a5ea414244988a51d743eb14e7"

# KV namespace for RaaS usage metering (hourly aggregated metrics)
# Create with: wrangler kv:namespace create "RAAS_USAGE_KV"
# Then replace id below with the output id
[[kv_namespaces]]
binding = "RAAS_USAGE_KV"
id = "placeholder_raas_usage_kv_id"
preview_id = "placeholder_raas_usage_kv_id"

# Secrets (set via: wrangler secret put <NAME>)
# SERVICE_TOKEN       — internal service auth token
# TELEGRAM_SECRET_TOKEN — Telegram webhook secret
# MK_API_KEYS         — comma-separated "mk_<key>:<tenantId>:<tier>" entries
#                       e.g. "mk_abc123:tenant1:pro,mk_xyz789:tenant2:free"
