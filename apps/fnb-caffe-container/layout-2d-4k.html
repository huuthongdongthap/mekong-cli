<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>F&B CAFFE CONTAINER — Layout 2D Blueprint | 10×40m</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Fira+Code:wght@400;500;600&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        body {
            background: #040810;
            color: #e4e8f1;
            font-family: 'Space Grotesk', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 32px
        }

        h1 {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 4px
        }

        h1 span {
            color: #00e5ff;
            text-shadow: 0 0 20px rgba(0, 229, 255, 0.4)
        }

        .sub {
            color: #8892a6;
            font-size: 0.85rem;
            margin-bottom: 24px
        }

        .blueprint-wrapper {
            position: relative;
            background: #080e1a;
            border: 2px solid rgba(0, 229, 255, 0.2);
            border-radius: 16px;
            padding: 32px;
            box-shadow: 0 0 60px rgba(0, 229, 255, 0.05), inset 0 0 80px rgba(0, 0, 0, 0.5);
            max-width: 900px;
            width: 100%
        }

        svg {
            width: 100%;
            height: auto;
            display: block
        }

        .legend {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            margin-top: 20px;
            padding-top: 16px;
            border-top: 1px solid rgba(255, 255, 255, 0.06);
            justify-content: center
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.72rem;
            color: #8892a6
        }

        .legend-dot {
            width: 12px;
            height: 12px;
            border-radius: 3px
        }

        .toolbar {
            display: flex;
            gap: 12px;
            margin-bottom: 16px;
            justify-content: center
        }

        .toolbar button {
            padding: 6px 16px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(255, 255, 255, 0.04);
            color: #e4e8f1;
            font-family: 'Fira Code', monospace;
            font-size: 0.75rem;
            cursor: pointer;
            transition: all 0.2s
        }

        .toolbar button:hover {
            border-color: #00e5ff;
            color: #00e5ff
        }

        .toolbar button.active {
            border-color: #00e5ff;
            background: rgba(0, 229, 255, 0.1);
            color: #00e5ff
        }

        .info {
            text-align: center;
            margin-top: 16px;
            font-family: 'Fira Code', monospace;
            font-size: 0.7rem;
            color: #4a5066
        }

        @media print {
            body {
                background: #fff;
                padding: 0
            }

            .blueprint-wrapper {
                border-color: #ccc;
                box-shadow: none;
                background: #fff
            }

            .toolbar {
                display: none
            }
        }
    </style>
</head>

<body>
    <h1>F&B <span>CAFFE</span> CONTAINER — Layout 2D</h1>
    <p class="sub">Bản vẽ mặt bằng 10m × 40m • Tỷ lệ 1:100 • 91 Hùng Vương, Sa Đéc</p>
    <div class="toolbar">
        <button class="active" onclick="toggleLayer('all')">Tất cả</button>
        <button onclick="toggleLayer('structure')">Kết cấu</button>
        <button onclick="toggleLayer('furniture')">Nội thất</button>
        <button onclick="toggleLayer('electrical')">Điện</button>
        <button onclick="toggleLayer('dimensions')">Kích thước</button>
    </div>

    <div class="blueprint-wrapper">
        <!-- Scale: 50px = 1m. Lot: 500px wide (10m) × 2000px tall (40m) -->
        <!-- Margins: 50px each side. Lot x=50-550, y=100-2100 -->
        <svg viewBox="0 0 600 2350" xmlns="http://www.w3.org/2000/svg">
            <defs>
                <pattern id="gs" width="25" height="25" patternUnits="userSpaceOnUse">
                    <path d="M 25 0 L 0 0 0 25" fill="none" stroke="rgba(0,229,255,0.04)" stroke-width="0.5" />
                </pattern>
                <pattern id="gl" width="50" height="50" patternUnits="userSpaceOnUse">
                    <rect width="50" height="50" fill="url(#gs)" />
                    <path d="M 50 0 L 0 0 0 50" fill="none" stroke="rgba(0,229,255,0.08)" stroke-width="0.5" />
                </pattern>
                <filter id="gw">
                    <feGaussianBlur stdDeviation="2" result="b" />
                    <feMerge>
                        <feMergeNode in="b" />
                        <feMergeNode in="SourceGraphic" />
                    </feMerge>
                </filter>
                <pattern id="wh" width="8" height="8" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
                    <line x1="0" y1="0" x2="0" y2="8" stroke="rgba(139,90,43,0.25)" stroke-width="1.5" />
                </pattern>
                <pattern id="pf" width="20" height="20" patternUnits="userSpaceOnUse">
                    <circle cx="10" cy="10" r="6" fill="none" stroke="rgba(57,255,20,0.15)" stroke-width="1" />
                    <circle cx="0" cy="0" r="4" fill="none" stroke="rgba(57,255,20,0.1)" stroke-width="0.5" />
                </pattern>
            </defs>
            <rect width="600" height="2350" fill="#080e1a" />
            <rect width="600" height="2350" fill="url(#gl)" />

            <!-- ═══ LOT BOUNDARY 10m×40m ═══ -->
            <g class="layer-structure layer-all">
                <rect x="50" y="100" width="500" height="2000" rx="3" fill="none" stroke="#00e5ff" stroke-width="2"
                    stroke-dasharray="8,4" opacity="0.5" />
                <text x="300" y="85" text-anchor="middle" font-size="14" fill="#00e5ff" font-family="Fira Code"
                    font-weight="600" filter="url(#gw)">MẶT TIỀN — HÙNG VƯƠNG (10m)</text>
            </g>

            <!-- ═══ DIMENSIONS ═══ -->
            <g class="layer-dimensions layer-all" fill="#8892a6" font-family="Fira Code" font-size="10">
                <!-- Width 10m -->
                <line x1="50" y1="70" x2="550" y2="70" stroke="#8892a6" stroke-width="0.8" />
                <line x1="50" y1="65" x2="50" y2="75" stroke="#8892a6" stroke-width="0.8" />
                <line x1="550" y1="65" x2="550" y2="75" stroke="#8892a6" stroke-width="0.8" />
                <text x="300" y="63" text-anchor="middle" font-size="11" fill="#00e5ff">10.00m</text>
                <!-- Height 40m -->
                <line x1="570" y1="100" x2="570" y2="2100" stroke="#8892a6" stroke-width="0.8" />
                <line x1="565" y1="100" x2="575" y2="100" stroke="#8892a6" stroke-width="0.8" />
                <line x1="565" y1="2100" x2="575" y2="2100" stroke="#8892a6" stroke-width="0.8" />
                <text x="585" y="1100" text-anchor="middle" font-size="11" fill="#00e5ff"
                    transform="rotate(90,585,1100)">40.00m</text>
            </g>

            <!-- ═══ LỐI ĐI XE / DRIVEWAY — RIGHT SIDE (1.5m wide) ═══ -->
            <!-- Runs from street entrance to parking at rear -->
            <g class="layer-structure layer-all">
                <rect x="475" y="100" width="75" height="2000" rx="0" fill="rgba(255,255,255,0.015)"
                    stroke="rgba(255,255,255,0.08)" stroke-width="1" stroke-dasharray="6,3" />
                <!-- Arrow markers showing direction -->
                <text x="512" y="300" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.2)">↓</text>
                <text x="512" y="600" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.2)">↓</text>
                <text x="512" y="900" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.2)">↓</text>
                <text x="512" y="1200" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.2)">↓</text>
                <text x="512" y="1500" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.2)">↓</text>
                <text x="512" y="1800" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.2)">↓</text>
            </g>
            <text x="512" y="140" text-anchor="middle" font-size="7" fill="#4a5066" font-family="Fira Code">LỐI
                XE</text>
            <text x="512" y="152" text-anchor="middle" font-size="7" fill="#4a5066" font-family="Fira Code">1.5m</text>

            <!-- Dimension: driveway width -->
            <g class="layer-dimensions layer-all" font-family="Fira Code" font-size="7" fill="#8892a6">
                <line x1="475" y1="165" x2="550" y2="165" stroke="#8892a6" stroke-width="0.5" />
                <line x1="475" y1="160" x2="475" y2="170" stroke="#8892a6" stroke-width="0.5" />
                <line x1="550" y1="160" x2="550" y2="170" stroke="#8892a6" stroke-width="0.5" />
                <text x="512" y="178" text-anchor="middle" fill="#00e5ff">1.50m</text>
            </g>

            <!-- ═══ CỬA CHÍNH — ENTRANCE ═══ -->
            <g class="layer-structure layer-all">
                <rect x="150" y="97" width="200" height="6" rx="2" fill="#00e5ff" opacity="0.6" />
                <text x="250" y="120" text-anchor="middle" font-size="9" fill="#00e5ff" font-family="Fira Code">CỬA
                    CHÍNH</text>
            </g>

            <!-- ════════════════════════════════════════════════════════════════ -->
            <!-- CONTAINER 40ft — CODING ZONE (đặt DỌC theo chiều sâu lô)      -->
            <!-- 2.44m rộng × 12.19m dài → SVG: 122w × 610h                    -->
            <!-- Vị trí: bên TRÁI, sát mặt tiền                                -->
            <!-- ════════════════════════════════════════════════════════════════ -->
            <g class="layer-structure layer-all">
                <rect x="55" y="130" width="122" height="610" rx="3" fill="rgba(0,229,255,0.06)" stroke="#00e5ff"
                    stroke-width="2.5" filter="url(#gw)" />
                <!-- Windows left wall -->
                <rect x="51" y="200" width="4" height="50" rx="1" fill="#39ff14" opacity="0.5" />
                <rect x="51" y="350" width="4" height="50" rx="1" fill="#39ff14" opacity="0.5" />
                <rect x="51" y="500" width="4" height="50" rx="1" fill="#39ff14" opacity="0.5" />
                <!-- Windows right wall (facing terrace) -->
                <rect x="177" y="200" width="4" height="50" rx="1" fill="#39ff14" opacity="0.5" />
                <rect x="177" y="350" width="4" height="50" rx="1" fill="#39ff14" opacity="0.5" />
                <rect x="177" y="500" width="4" height="50" rx="1" fill="#39ff14" opacity="0.5" />
                <rect x="177" y="600" width="4" height="50" rx="1" fill="#39ff14" opacity="0.5" />
                <!-- Glass entrance at top -->
                <rect x="85" y="126" width="60" height="6" rx="1" fill="#00e5ff" opacity="0.7" />
            </g>
            <!-- Furniture: work desks (long tables along length) -->
            <g class="layer-furniture layer-all" opacity="0.7">
                <rect x="70" y="180" width="90" height="14" rx="2" fill="rgba(139,90,43,0.3)"
                    stroke="rgba(139,90,43,0.5)" stroke-width="0.7" />
                <rect x="70" y="220" width="90" height="14" rx="2" fill="rgba(139,90,43,0.3)"
                    stroke="rgba(139,90,43,0.5)" stroke-width="0.7" />
                <rect x="70" y="260" width="90" height="14" rx="2" fill="rgba(139,90,43,0.3)"
                    stroke="rgba(139,90,43,0.5)" stroke-width="0.7" />
                <rect x="70" y="350" width="90" height="14" rx="2" fill="rgba(139,90,43,0.3)"
                    stroke="rgba(139,90,43,0.5)" stroke-width="0.7" />
                <rect x="70" y="390" width="90" height="14" rx="2" fill="rgba(139,90,43,0.3)"
                    stroke="rgba(139,90,43,0.5)" stroke-width="0.7" />
                <rect x="70" y="430" width="90" height="14" rx="2" fill="rgba(139,90,43,0.3)"
                    stroke="rgba(139,90,43,0.5)" stroke-width="0.7" />
                <!-- Standing desk area at back -->
                <rect x="70" y="560" width="90" height="10" rx="2" fill="rgba(139,90,43,0.2)"
                    stroke="rgba(139,90,43,0.3)" stroke-width="0.5" />
                <rect x="70" y="590" width="90" height="10" rx="2" fill="rgba(139,90,43,0.2)"
                    stroke="rgba(139,90,43,0.3)" stroke-width="0.5" />
                <rect x="70" y="620" width="90" height="10" rx="2" fill="rgba(139,90,43,0.2)"
                    stroke="rgba(139,90,43,0.3)" stroke-width="0.5" />
                <!-- Bookshelf at the end -->
                <rect x="65" y="680" width="100" height="15" rx="2" fill="rgba(139,90,43,0.15)"
                    stroke="rgba(139,90,43,0.3)" stroke-width="0.5" />
            </g>
            <!-- Electrical: power outlets along walls -->
            <g class="layer-electrical layer-all" opacity="0.6">
                <circle cx="80" cy="170" r="3" fill="none" stroke="#ffb300" stroke-width="0.8" />
                <text x="80" y="172" text-anchor="middle" font-size="3.5" fill="#ffb300">⚡</text>
                <circle cx="80" cy="310" r="3" fill="none" stroke="#ffb300" stroke-width="0.8" />
                <text x="80" y="312" text-anchor="middle" font-size="3.5" fill="#ffb300">⚡</text>
                <circle cx="80" cy="470" r="3" fill="none" stroke="#ffb300" stroke-width="0.8" />
                <text x="80" y="472" text-anchor="middle" font-size="3.5" fill="#ffb300">⚡</text>
                <circle cx="80" cy="550" r="3" fill="none" stroke="#ffb300" stroke-width="0.8" />
                <text x="80" y="552" text-anchor="middle" font-size="3.5" fill="#ffb300">⚡</text>
                <rect x="130" y="130" width="10" height="5" rx="1" fill="none" stroke="#ffb300" stroke-width="0.6" />
                <text x="135" y="134" text-anchor="middle" font-size="3.5" fill="#ffb300">AC</text>
                <rect x="130" y="500" width="10" height="5" rx="1" fill="none" stroke="#ffb300" stroke-width="0.6" />
                <text x="135" y="504" text-anchor="middle" font-size="3.5" fill="#ffb300">AC</text>
            </g>
            <!-- Label -->
            <text x="116" y="320" text-anchor="middle" font-size="11" fill="#00e5ff" font-family="Space Grotesk"
                font-weight="700" filter="url(#gw)" transform="rotate(-90,116,320)">CODING ZONE</text>
            <text x="140" y="480" text-anchor="middle" font-size="6" fill="#4a5066" font-family="Fira Code"
                transform="rotate(-90,140,480)">Container 40ft • 12.19m × 2.44m</text>
            <!-- Dimensions -->
            <g class="layer-dimensions layer-all" font-family="Fira Code" font-size="7" fill="#8892a6">
                <!-- Width 2.44m -->
                <line x1="55" y1="755" x2="177" y2="755" stroke="#8892a6" stroke-width="0.4" />
                <line x1="55" y1="750" x2="55" y2="760" stroke="#8892a6" stroke-width="0.4" />
                <line x1="177" y1="750" x2="177" y2="760" stroke="#8892a6" stroke-width="0.4" />
                <text x="116" y="770" text-anchor="middle" fill="#00e5ff" font-size="8">2.44m</text>
                <!-- Height 12.19m -->
                <line x1="40" y1="130" x2="40" y2="740" stroke="#8892a6" stroke-width="0.4" />
                <line x1="35" y1="130" x2="45" y2="130" stroke="#8892a6" stroke-width="0.4" />
                <line x1="35" y1="740" x2="45" y2="740" stroke="#8892a6" stroke-width="0.4" />
                <text x="28" y="435" text-anchor="middle" fill="#00e5ff" font-size="8"
                    transform="rotate(-90,28,435)">12.19m</text>
            </g>

            <!-- ════════════════════════════════════════════════════════════════ -->
            <!-- TWO 20ft CONTAINERS — MEETING + CAFÉ BAR (cạnh nhau, bên trái)-->
            <!-- Mỗi cái: 2.44m rộng × 6.06m dài → SVG: 122w × 303h           -->
            <!-- Đặt bên dưới container 40ft                                    -->
            <!-- ════════════════════════════════════════════════════════════════ -->
            <!-- Meeting Room -->
            <g class="layer-structure layer-all">
                <rect x="55" y="790" width="122" height="303" rx="3" fill="rgba(255,0,255,0.05)" stroke="#ff00ff"
                    stroke-width="2" filter="url(#gw)" />
                <!-- Door facing terrace -->
                <rect x="177" y="880" width="5" height="60" rx="1" fill="#ff00ff" opacity="0.5" />
            </g>
            <g class="layer-furniture layer-all" opacity="0.7">
                <rect x="80" y="870" width="70" height="30" rx="3" fill="rgba(139,90,43,0.3)"
                    stroke="rgba(139,90,43,0.5)" stroke-width="0.7" />
                <circle cx="90" cy="865" r="4" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.2)"
                    stroke-width="0.5" />
                <circle cx="115" cy="865" r="4" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.2)"
                    stroke-width="0.5" />
                <circle cx="140" cy="865" r="4" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.2)"
                    stroke-width="0.5" />
                <circle cx="90" cy="905" r="4" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.2)"
                    stroke-width="0.5" />
                <circle cx="115" cy="905" r="4" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.2)"
                    stroke-width="0.5" />
                <circle cx="140" cy="905" r="4" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.2)"
                    stroke-width="0.5" />
                <rect x="59" y="830" width="5" height="40" rx="1" fill="rgba(0,229,255,0.3)" stroke="#00e5ff"
                    stroke-width="0.5" />
                <rect x="59" y="1010" width="5" height="30" rx="1" fill="rgba(255,255,255,0.15)"
                    stroke="rgba(255,255,255,0.3)" stroke-width="0.5" />
            </g>
            <text x="116" y="955" text-anchor="middle" font-size="11" fill="#ff00ff" font-family="Space Grotesk"
                font-weight="700" filter="url(#gw)">MEETING</text>
            <text x="116" y="970" text-anchor="middle" font-size="6" fill="#4a5066" font-family="Fira Code">20ft •
                6.06×2.44m</text>

            <!-- Café Bar -->
            <g class="layer-structure layer-all">
                <rect x="185" y="790" width="122" height="303" rx="3" fill="rgba(255,179,0,0.05)" stroke="#ffb300"
                    stroke-width="2" filter="url(#gw)" />
                <!-- Open counter facing terrace -->
                <rect x="307" y="880" width="5" height="80" rx="1" fill="#ffb300" opacity="0.5" />
                <!-- Counter facing entrance -->
                <rect x="210" y="786" width="70" height="6" rx="1" fill="#ffb300" opacity="0.4" />
            </g>
            <g class="layer-furniture layer-all" opacity="0.7">
                <!-- L-shaped bar counter inside -->
                <path d="M 195 800 L 195 1060 L 295 1060 L 295 1040 L 210 1040 L 210 800 Z" fill="rgba(139,90,43,0.25)"
                    stroke="rgba(139,90,43,0.5)" stroke-width="1" />
                <!-- Espresso machine -->
                <rect x="215" y="810" width="20" height="12" rx="2" fill="rgba(100,100,100,0.3)"
                    stroke="rgba(200,200,200,0.3)" stroke-width="0.6" />
                <!-- Sink -->
                <rect x="260" y="810" width="15" height="10" rx="2" fill="rgba(0,150,255,0.15)"
                    stroke="rgba(0,150,255,0.3)" stroke-width="0.6" />
                <!-- Bar stools outside -->
                <circle cx="300" cy="1065" r="4" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.2)"
                    stroke-width="0.5" />
                <circle cx="270" cy="1065" r="4" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.2)"
                    stroke-width="0.5" />
                <circle cx="240" cy="1065" r="4" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.2)"
                    stroke-width="0.5" />
            </g>
            <g class="layer-electrical layer-all" opacity="0.6">
                <rect x="240" y="810" width="10" height="7" rx="1" fill="none" stroke="#ffb300" stroke-width="0.6" />
                <text x="245" y="815" text-anchor="middle" font-size="4" fill="#ffb300">POS</text>
            </g>
            <text x="246" y="930" text-anchor="middle" font-size="11" fill="#ffb300" font-family="Space Grotesk"
                font-weight="700" filter="url(#gw)">CAFÉ BAR</text>
            <text x="246" y="945" text-anchor="middle" font-size="6" fill="#4a5066" font-family="Fira Code">20ft •
                6.06×2.44m</text>

            <!-- Dimensions for 20ft containers -->
            <g class="layer-dimensions layer-all" font-family="Fira Code" font-size="7" fill="#8892a6">
                <line x1="40" y1="790" x2="40" y2="1093" stroke="#8892a6" stroke-width="0.4" />
                <line x1="35" y1="790" x2="45" y2="790" stroke="#8892a6" stroke-width="0.4" />
                <line x1="35" y1="1093" x2="45" y2="1093" stroke="#8892a6" stroke-width="0.4" />
                <text x="28" y="940" text-anchor="middle" fill="#00e5ff" font-size="7"
                    transform="rotate(-90,28,940)">6.06m</text>
            </g>

            <!-- ════════════════════════════════════════════════════════════════ -->
            <!-- OUTDOOR TERRACE (bên phải containers + phía dưới)               -->
            <!-- Từ x=185 đến x=475 (bên phải containers), y=130-1100           -->
            <!-- Và toàn bộ x=55-475 phía dưới containers, y=1100-1400          -->
            <!-- ════════════════════════════════════════════════════════════════ -->
            <!-- Side terrace (right of containers) -->
            <g class="layer-structure layer-all">
                <rect x="190" y="130" width="280" height="650" rx="3" fill="url(#wh)" stroke="rgba(139,90,43,0.3)"
                    stroke-width="1" />
                <rect x="190" y="130" width="280" height="650" rx="3" fill="rgba(139,90,43,0.03)" />
            </g>

    <script>
        function toggleLayer(layer) {
            const all = ['structure', 'furniture', 'electrical', 'dimensions'];
            const btns = document.querySelectorAll('.toolbar button');
            btns.forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            if (layer === 'all') { all.forEach(l => { document.querySelectorAll('.layer-' + l).forEach(el => el.style.opacity = '') }); document.querySelectorAll('.layer-all').forEach(el => el.style.display = ''); return }
            document.querySelectorAll('[class*="layer-"]').forEach(el => { el.style.opacity = '0.08' });
            document.querySelectorAll('.layer-' + layer).forEach(el => { el.style.opacity = '' });
            if (layer !== 'structure') { document.querySelectorAll('.layer-structure').forEach(el => { el.style.opacity = '0.3' }) }
        }
    </script>
