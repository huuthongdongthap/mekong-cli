<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline - F&B Container Café</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      background: linear-gradient(135deg, #1a1612 0%, #2d2420 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      padding: 24px;
    }

    .offline-container {
      text-align: center;
      max-width: 400px;
    }

    .offline-icon {
      font-size: 64px;
      margin-bottom: 24px;
    }

    h1 {
      font-size: 28px;
      font-weight: 600;
      margin-bottom: 16px;
      color: #f5e6d3;
    }

    p {
      font-size: 16px;
      line-height: 1.6;
      color: #b8a89a;
      margin-bottom: 32px;
    }

    .retry-btn {
      display: inline-block;
      background: #4a2c17;
      color: #f5e6d3;
      padding: 14px 32px;
      border-radius: 12px;
      text-decoration: none;
      font-weight: 500;
      font-size: 16px;
      transition: all 0.2s;
      border: 1px solid #6b4423;
      cursor: pointer;
    }

    .retry-btn:hover {
      background: #6b4423;
      transform: translateY(-2px);
    }

    .offline-tips {
      margin-top: 32px;
      padding-top: 24px;
      border-top: 1px solid rgba(255,255,255,0.1);
    }

    .offline-tips h2 {
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #8b7355;
      margin-bottom: 12px;
    }

    .offline-tips ul {
      list-style: none;
      text-align: left;
    }

    .offline-tips li {
      padding: 8px 0;
      color: #a89888;
      font-size: 14px;
    }

    .offline-tips li::before {
      content: "✓";
      color: #4a2c17;
      margin-right: 8px;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="offline-container">
    <div class="offline-icon">📡</div>
    <h1>Bạn đang offline</h1>
    <p>Không có kết nối internet. Một số tính năng có thể không khả dụng.</p>

    <button class="retry-btn" onclick="window.location.reload()">
      🔄 Thử lại
    </button>

    <div class="offline-tips">
      <h2>Chế độ offline</h2>
      <ul>
        <li>Xem menu đã lưu trong cache</li>
        <li>Xem thông tin quán</li>
        <li>Đơn hàng sẽ được đồng bộ khi có mạng</li>
      </ul>
    </div>
  </div>

  <script>
    // Auto retry when back online
    window.addEventListener('online', () => {
      setTimeout(() => window.location.reload(), 1000);
    });

    // Check connection status
    if (navigator.onLine) {
      window.location.reload();
    }
  </script>
</body>
</html>
