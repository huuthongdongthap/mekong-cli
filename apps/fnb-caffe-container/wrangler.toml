name = "fnb-caffe-container"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

[site]
bucket = "."

[build]
command = "npm run build:full"

[[build.processing.rules]]
type = "JavaScriptModule"
globs = ["**/*.js"]

# D1 Database
[[d1_databases]]
binding = "DB"
database_name = "fnb-db"
database_id = "YOUR_D1_DATABASE_ID"
migrations_dir = "worker/migrations"

# Environment variables
[vars]
NODE_ENV = "production"
API_VERSION = "1.0.0"

# Preview environment
[env.preview]
name = "fnb-caffe-container-preview"
[env.preview.vars]
NODE_ENV = "preview"
