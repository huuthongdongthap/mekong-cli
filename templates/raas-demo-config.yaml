# RaaS Demo Configuration Template
# Use this to customize sales proposals for specific clients

# Client Information
client:
  name: "[Client Name]"
  company: "[Company Name]"
  industry: "[Industry - e.g., Digital Agency, SaaS Startup, Enterprise]"
  email: "[Contact Email]"
  current_date: "{{DATE}}"

# Current Pain Points (select applicable)
pain_points:
  - unpredictable_development_costs
  - capacity_constraints
  - hiring_challenges
  - tech_debt_accumulation
  - slow_cycle_time
  - quality_inconsistency

# Recommended Tier
recommended_tier: pro  # starter, pro, enterprise

# Custom ROI Projections
roi_projections:
  current_hourly_rate: 200  # Their current dev cost/hr
  monthly_hours_automated: 62  # Hours saved with RaaS
  monthly_value_generated: 9300  # Hours × rate
  net_monthly_roi: 9151  # Value - subscription cost

# Demo Mission Suggestions
demo_missions:
  - name: "Sprint Automation"
    description: "Automate a full development sprint with AI agents"
    credits: 10
    complexity: multi-agent
  - name: "Tech Debt Elimination"
    description: "Scan and fix all TODOs, console.logs, any types"
    credits: 5
    complexity: complex
  - name: "CI/CD Pipeline Setup"
    description: "Configure automated testing and deployment"
    credits: 5
    complexity: complex

# Competitive Comparison (select their current solution)
current_solution:
  type: traditional_agency  # traditional_agency, zapier, in_house, none
  monthly_cost: 4000
  pain_points:
    - Expensive hourly billing
    - Slow turnaround
    - Quality varies

# Call to Action
cta:
  demo_url: "https://agencyos.network/demo"
  trial_url: "https://agencyos.network/pricing"
  sales_email: "sales@agencyos.network"

# Follow-up Schedule
follow_up:
  day_1: "Send personalized ROI analysis"
  day_3: "Share relevant case study"
  day_7: "Schedule demo call"
  day_14: "Trial expiration reminder"
