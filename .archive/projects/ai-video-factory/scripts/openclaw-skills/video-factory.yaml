# OpenClaw Skill: AI Video Factory
# This skill enables Sophia to control video production via chat commands

skill:
  name: ai-video-factory
  version: 1.0.0
  description: AI-powered video production for affiliate marketing
  author: AgencyOS

triggers:
  - pattern: "/video {product} {style}"
    action: generate_video
    description: Generate a complete video for a product

  - pattern: "/script {topic}"
    action: generate_script
    description: Generate video script only

  - pattern: "/voice {script_id}"
    action: generate_voice
    description: Generate voiceover for approved script

  - pattern: "/publish {video_id}"
    action: publish_video
    description: Publish video to all platforms

  - pattern: "/publish {video_id} {platform}"
    action: publish_single
    description: Publish to specific platform

  - pattern: "/schedule {video_id} {datetime}"
    action: schedule_video
    description: Schedule video for future publish

  - pattern: "/stats"
    action: show_stats
    description: Show channel analytics overview

  - pattern: "/stats {channel}"
    action: show_channel_stats
    description: Show specific channel stats

  - pattern: "/revenue"
    action: show_revenue
    description: Show affiliate revenue summary

  - pattern: "/revenue {period}"
    action: show_revenue_period
    description: Show revenue for specific period (week/month/year)

  - pattern: "/queue"
    action: show_queue
    description: Show production queue status

  - pattern: "/calendar"
    action: show_calendar
    description: Show content calendar

  - pattern: "/approve"
    action: approve_pending
    description: Approve pending script/video

  - pattern: "/edit {notes}"
    action: request_edit
    description: Request edits to pending content

actions:
  generate_video:
    steps:
      - name: validate_product
        type: lookup
        source: affiliates.json
        key: "{{ product }}"
        on_fail: "Product '{{ product }}' not found. Use /products to see available options."

      - name: select_template
        type: lookup
        source: templates.json
        key: "{{ style }}"
        default: "product_review"

      - name: trigger_n8n
        type: webhook
        url: "{{ N8N_WEBHOOK_URL }}/script-generator"
        method: POST
        body:
          product: "{{ product }}"
          template: "{{ template }}"
          trigger: "openclaw"

      - name: respond
        type: message
        content: |
          🎬 Starting video production for **{{ product }}**

          📝 Template: {{ style | default: 'product_review' }}
          ⏱️ Estimated time: 8-10 minutes

          I'll notify you when the script is ready for review!

  generate_script:
    steps:
      - name: infer_product
        type: ai
        prompt: "Extract the product name from: '{{ topic }}'. Return just the product name or 'general' if no specific product."

      - name: trigger_n8n
        type: webhook
        url: "{{ N8N_WEBHOOK_URL }}/script-generator"
        method: POST
        body:
          topic: "{{ topic }}"
          script_only: true

      - name: respond
        type: message
        content: |
          📝 Generating script for: **{{ topic }}**

          ⏱️ Estimated time: 2-3 minutes

  show_stats:
    steps:
      - name: fetch_youtube
        type: api
        url: "https://www.googleapis.com/youtube/v3/analytics"
        # Simplified for skill definition

      - name: respond
        type: message
        content: |
          📊 **Channel Analytics (Last 7 Days)**

          **YouTube Shorts**
          • Views: {{ youtube.views }}
          • Subscribers: +{{ youtube.new_subs }}
          • Top video: {{ youtube.top_video }}

          **TikTok**
          • Views: {{ tiktok.views }}
          • Followers: +{{ tiktok.new_followers }}

          **Instagram Reels**
          • Views: {{ instagram.views }}
          • Reach: {{ instagram.reach }}

  show_revenue:
    steps:
      - name: fetch_airtable
        type: api
        url: "https://api.airtable.com/v0/{{ AIRTABLE_BASE_ID }}/Commissions"

      - name: respond
        type: message
        content: |
          💰 **Affiliate Revenue Summary**

          **This Month**
          • Total: ${{ monthly_total }}
          • Conversions: {{ conversions }}
          • Best performer: {{ top_product }}

          **Pending Payout**
          • Amount: ${{ pending }}
          • Next payout: {{ next_payout_date }}

          **Top Channels by Revenue**
          1. {{ channel_1 }}: ${{ revenue_1 }}
          2. {{ channel_2 }}: ${{ revenue_2 }}
          3. {{ channel_3 }}: ${{ revenue_3 }}

  show_queue:
    steps:
      - name: fetch_airtable
        type: api
        url: "https://api.airtable.com/v0/{{ AIRTABLE_BASE_ID }}/Videos?filterByFormula=NOT({Status}='Published')"

      - name: respond
        type: message
        content: |
          📋 **Production Queue**

          **Pending Approval** ({{ pending_count }})
          {{ pending_list }}

          **In Production** ({{ in_progress_count }})
          {{ in_progress_list }}

          **Scheduled** ({{ scheduled_count }})
          {{ scheduled_list }}

  approve_pending:
    steps:
      - name: get_context
        type: context
        key: last_pending_id

      - name: trigger_publish
        type: webhook
        url: "{{ N8N_WEBHOOK_URL }}/multi-publish"
        method: POST
        body:
          video_id: "{{ last_pending_id }}"
          action: approve

      - name: respond
        type: message
        content: |
          ✅ Approved! Publishing to all platforms...

          • YouTube Shorts
          • TikTok
          • Instagram Reels

          I'll send you confirmation links in a moment!

memory:
  persist:
    - last_pending_id
    - last_product
    - preferred_style
    - default_platforms

  context_window: 10

config:
  n8n_webhook_base: "{{ env.N8N_WEBHOOK_URL }}"
  airtable_base: "{{ env.AIRTABLE_BASE_ID }}"
  telegram_chat: "{{ env.TELEGRAM_CHAT_ID }}"

  defaults:
    video_style: product_review
    platforms:
      - youtube_shorts
      - tiktok
      - instagram_reels
    voice: default_sophia
