name = "zalo-auto-sales"
main = "src/index.ts"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

[triggers]
crons = ["*/1 * * * *"]  # Every minute - process sequences

[[d1_databases]]
binding = "DB"
database_name = "zalo-auto-sales"
database_id = "cb0ca817-13ca-4a28-84bd-7539e0df8015"

[vars]
ENVIRONMENT = "production"

