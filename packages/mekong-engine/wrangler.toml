name = "mekong-engine"
main = "src/index.ts"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

account_id = "f691e83094f776311a1bfe3f8b126f1c"

[vars]
ENVIRONMENT = "production"
DEFAULT_LLM_MODEL = "@cf/meta/llama-3.1-8b-instruct"
FB_VERIFY_TOKEN = "mekong_verify"

[[d1_databases]]
binding = "DB"
database_name = "mekong-db"
database_id = "231c8d3a-4e59-46e6-86a5-7bb0af3b0810"
migrations_dir = "migrations"

[[kv_namespaces]]
binding = "RATE_LIMIT_KV"
id = "982a12a5ea414244988a51d743eb14e7"

[ai]
binding = "AI"

# R2 Bucket — enable R2 in dashboard first, then uncomment:
# [[r2_buckets]]
# binding = "RECIPES"
# bucket_name = "mekong-recipes"

# Secrets (set via: npx wrangler secret put <NAME>)
# LLM_API_KEY, SERVICE_TOKEN, POLAR_WEBHOOK_SECRET

[triggers]
crons = ["*/30 * * * *"]

# ============================================
# STAGING ENVIRONMENT
# ============================================
[env.staging]
name = "mekong-engine-staging"
vars = { ENVIRONMENT = "staging", DEFAULT_LLM_MODEL = "@cf/meta/llama-3.1-8b-instruct" }

[[env.staging.d1_databases]]
binding = "DB"
database_name = "mekong-db-staging"
database_id = ""

[[env.staging.kv_namespaces]]
binding = "RATE_LIMIT_KV"
id = ""

[env.staging.ai]
binding = "AI"
