OpenClaw RaaS
<span>AI Business Platform</span> </div> <nav class="sidebar-nav"> <a href="/dashboard" class="nav-item"> <span class="nav-icon">📊</span> Tổng quan </a><a href="/messages" class="nav-item"> <span class="nav-icon">💬</span> Tin nhắn </a><a href="/content" class="nav-item active"> <span class="nav-icon">📝</span> Nội dung </a><a href="/contacts" class="nav-item"> <span class="nav-icon">👥</span> Khách hàng </a><a href="/reports" class="nav-item"> <span class="nav-icon">📈</span> Báo cáo </a><a href="/settings" class="nav-item"> <span class="nav-icon">⚙️</span> Cài đặt </a><a href="/upgrade" class="nav-item"> <span class="nav-icon">⭐</span> Nâng cấp </a> </nav> </aside> <div class="main"> <header class="topbar"> <span class="topbar-biz" id="topbar-biz-name">Doanh nghiệp của bạn</span> <div class="topbar-right"> <button class="btn-logout" id="btn-logout">Đăng xuất</button> </div> </header> <main class="content">  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px"> <h2 style="font-size:18px">Nội dung</h2> <button class="btn btn-primary" id="btn-generate">✨ Tạo 7 ngày content</button> </div> <div id="gen-status" style="display:none;margin-bottom:16px" class="card"> <p id="gen-msg" style="color:var(--text2);font-size:13px">Đang tạo nội dung...</p> </div> <div class="card"> <div id="content-list"> <p style="color:var(--text2);font-size:13px;text-align:center;padding:32px 0">Đang tải...</p> </div> </div>  </main> </div> </div> <script type="module">const t=localStorage.getItem("mk_biz_name");if(t){const e=document.getElementById("topbar-biz-name");e&&(e.textContent=t)}document.getElementById("btn-logout")?.addEventListener("click",()=>{localStorage.removeItem("mk_api_key"),localStorage.removeItem("mk_biz_name"),window.location.href="/signup"});</script> </body> </html> <script type="module">const o="https://mekong-engine.agencyos-openclaw.workers.dev";localStorage.getItem("mk_api_key")||window.location.replace("/signup");const c=()=>localStorage.getItem("mk_api_key"),a=()=>({"Content-Type":"application/json",Authorization:"Bearer "+c()}),i={draft:"Nháp",approved:"Đã duyệt",published:"Đã đăng",rejected:"Từ chối"},r={draft:"badge-gray",approved:"badge-green",published:"badge-green",rejected:"badge-yellow"};async function s(){try{const e=await fetch(o+"/v1/content/posts",{headers:a()}).then(t=>t.json()),n=Array.isArray(e)?e:e.posts||[];if(!n.length){document.getElementById("content-list").innerHTML='<p style="color:var(--text2);font-size:13px;text-align:center;padding:32px 0">Chưa có nội dung nào. Nhấn "Tạo 7 ngày content" để bắt đầu.</p>';return}document.getElementById("content-list").innerHTML=n.map(t=>`
        <div style="padding:14px 0;border-bottom:1px solid var(--border)">
          <div style="display:flex;align-items:start;justify-content:space-between;gap:12px">
            <div style="flex:1">
              <div style="font-size:13px;margin-bottom:4px">${t.content||t.text||""}</div>
              <div style="color:var(--text2);font-size:11px">${t.scheduled_date||""} · ${t.platform||"Facebook"}</div>
            </div>
            <div style="display:flex;align-items:center;gap:8px;flex-shrink:0">
              <span class="badge ${r[t.status]||"badge-gray"}">${i[t.status]||t.status}</span>
              ${t.status==="draft"?`<button class="btn btn-secondary btn-sm" onclick="approve('${t.id}')">✓ Duyệt</button><button class="btn btn-secondary btn-sm" onclick="reject('${t.id}')">✕</button>`:""}
            </div>
          </div>
        </div>`).join("")}catch{document.getElementById("content-list").innerHTML='<p style="color:var(--danger);font-size:13px;padding:16px">Không thể tải nội dung.</p>'}}window.approve=async e=>{await fetch(o+"/v1/content/posts/"+e+"/approve",{method:"POST",headers:a()}).catch(()=>{}),s()};window.reject=async e=>{await fetch(o+"/v1/content/posts/"+e+"/reject",{method:"POST",headers:a()}).catch(()=>{}),s()};document.getElementById("btn-generate").addEventListener("click",async()=>{const e=document.getElementById("btn-generate"),n=document.getElementById("gen-status"),t=document.getElementById("gen-msg");e.disabled=!0,e.textContent="Đang tạo...",n.style.display="block",t.textContent="AI đang tạo 7 ngày nội dung...";try{const d=await(await fetch(o+"/v1/content/generate",{method:"POST",headers:a(),body:JSON.stringify({days:7})})).json();t.style.color="var(--success)",t.textContent=d.message||`Đã tạo ${d.count||7} bài viết thành công!`,s()}catch{t.style.color="var(--danger)",t.textContent="Lỗi tạo nội dung. Thử lại sau."}finally{e.disabled=!1,e.textContent="✨ Tạo 7 ngày content"}});s();</script>
