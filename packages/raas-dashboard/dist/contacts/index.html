<span>AI Business Platform</span> </div> <nav class="sidebar-nav"> <a href="/dashboard" class="nav-item"> <span class="nav-icon">📊</span> Tổng quan </a><a href="/messages" class="nav-item"> <span class="nav-icon">💬</span> Tin nhắn </a><a href="/content" class="nav-item"> <span class="nav-icon">📝</span> Nội dung </a><a href="/contacts" class="nav-item active"> <span class="nav-icon">👥</span> Khách hàng </a><a href="/reports" class="nav-item"> <span class="nav-icon">📈</span> Báo cáo </a><a href="/settings" class="nav-item"> <span class="nav-icon">⚙️</span> Cài đặt </a><a href="/upgrade" class="nav-item"> <span class="nav-icon">⭐</span> Nâng cấp </a> </nav> </aside> <div class="main"> <header class="topbar"> <span class="topbar-biz" id="topbar-biz-name">Doanh nghiệp của bạn</span> <div class="topbar-right"> <button class="btn-logout" id="btn-logout">Đăng xuất</button> </div> </header> <main class="content">  <h2 style="font-size:18px;margin-bottom:20px">Khách hàng</h2> <div class="card"> <div style="margin-bottom:16px;display:flex;gap:10px"> <input id="search-input" placeholder="Tìm theo tên hoặc số điện thoại..." style="max-width:320px"> </div> <div style="overflow-x:auto"> <table> <thead> <tr> <th>Tên</th> <th>Nền tảng</th> <th>Lượt ghé thăm</th> <th>Liên hệ gần nhất</th> <th>Trạng thái</th> </tr> </thead> <tbody id="contacts-body"> <tr><td colspan="5" style="color:var(--text2);text-align:center;padding:32px">Đang tải...</td></tr> </tbody> </table> </div> <div id="contacts-pagination" style="margin-top:12px;color:var(--text2);font-size:12px"></div> </div>  </main> </div> </div> <script type="module">const t=localStorage.getItem("mk_biz_name");if(t){const e=document.getElementById("topbar-biz-name");e&&(e.textContent=t)}document.getElementById("btn-logout")?.addEventListener("click",()=>{localStorage.removeItem("mk_api_key"),localStorage.removeItem("mk_biz_name"),window.location.href="/signup"});</script> </body> </html> <script type="module">const r="https://api.agencyos.network";localStorage.getItem("mk_api_key")||window.location.replace("/signup");const c=()=>localStorage.getItem("mk_api_key"),d=()=>({Authorization:"Bearer "+c()});let a=[];const i={zalo:"💙",facebook:"💙",zalo_oa:"💙",instagram:"📸"};function o(e){const n=document.getElementById("contacts-body");if(!e.length){n.innerHTML='<tr><td colspan="5" style="color:var(--text2);text-align:center;padding:32px">Chưa có khách hàng nào.</td></tr>';return}n.innerHTML=e.map(t=>`
      <tr>
        <td>
          <div style="font-weight:500">${t.name||"Ẩn danh"}</div>
          ${t.phone?`<div style="color:var(--text2);font-size:11px">${t.phone}</div>`:""}
        </td>
        <td>${i[t.platform]||"💬"} ${t.platform||"—"}</td>
        <td>${t.visit_count??"—"}</td>
        <td style="color:var(--text2);font-size:12px">${t.last_contact?new Date(t.last_contact).toLocaleDateString("vi-VN"):"—"}</td>

      </tr>`).join("")}async function s(){try{const e=await fetch(r+"/v1/crm/contacts",{headers:d()}).then(t=>t.json());a=Array.isArray(e)?e:e.contacts||[],o(a);const n=document.getElementById("contacts-pagination");n.textContent=`Hiển thị ${a.length} khách hàng`}catch{document.getElementById("contacts-body").innerHTML='<tr><td colspan="5" style="color:var(--danger);text-align:center;padding:16px">Không thể tải danh sách.</td></tr>'}}document.getElementById("search-input").addEventListener("input",e=>{const n=e.target.value.toLowerCase();o(a.filter(t=>(t.name||"").toLowerCase().includes(n)||(t.phone||"").includes(n)))});s();</script>
