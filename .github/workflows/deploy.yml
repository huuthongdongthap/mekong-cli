name: Deploy to Cloud Run
on:
  push:
    branches: [main]
jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: 'read'
      id-token: 'write'
    steps:
      - uses: actions/checkout@v4
      - name: Google Auth
        id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}'
      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: mekong-api
          source: .
          region: us-central1
          env_vars: |
            PAYPAL_MODE=${{ secrets.PAYPAL_MODE }}
            API_BASE_URL=${{ secrets.API_BASE_URL }}
            FRONTEND_URL=${{ secrets.FRONTEND_URL }}
          secrets: |
            PAYPAL_CLIENT_ID=PAYPAL_CLIENT_ID:latest
            PAYPAL_CLIENT_SECRET=PAYPAL_CLIENT_SECRET:latest
            PAYPAL_WEBHOOK_ID=PAYPAL_WEBHOOK_ID:latest
            STRIPE_SECRET_KEY=STRIPE_SECRET_KEY:latest
            STRIPE_PUBLISHABLE_KEY=STRIPE_PUBLISHABLE_KEY:latest
            STRIPE_WEBHOOK_SECRET=STRIPE_WEBHOOK_SECRET:latest
            GUMROAD_ACCESS_TOKEN=GUMROAD_ACCESS_TOKEN:latest
            LICENSE_SECRET_KEY=LICENSE_SECRET_KEY:latest
