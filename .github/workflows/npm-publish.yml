name: Publish npm Packages

on:
  workflow_dispatch:
    inputs:
      package:
        description: 'Package to publish'
        required: true
        type: choice
        options:
          - raas-sdk
          - raas-marketplace
          - mekong-cli-core
          - openclaw-engine
          - all
  push:
    tags:
      - 'v*'

jobs:
  safety-check:
    runs-on: ubuntu-latest
    steps:
      - name: Verify publish boundary
        run: |
          echo "Only packages/ directory is published — never apps/"
          echo "Allowed: raas-sdk, raas-marketplace, mekong-cli-core, openclaw-engine"

  publish:
    needs: safety-check
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        package: ${{ github.event_name == 'workflow_dispatch' && (github.event.inputs.package == 'all' && fromJSON('["raas-sdk","raas-marketplace","mekong-cli-core","openclaw-engine"]') || fromJSON(format('["{0}"]', github.event.inputs.package))) || fromJSON('["raas-sdk","raas-marketplace","mekong-cli-core","openclaw-engine"]') }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
          cache: 'pnpm'

      - name: Validate package path is under packages/
        run: |
          PKG_PATH="packages/${{ matrix.package }}"
          if [[ "$PKG_PATH" != packages/* ]]; then
            echo "ERROR: Package path must start with packages/ — aborting"
            exit 1
          fi
          echo "Safety check passed: $PKG_PATH"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build ${{ matrix.package }}
        run: pnpm --filter "${{ matrix.package }}" build

      - name: Test ${{ matrix.package }}
        run: pnpm --filter "${{ matrix.package }}" test --passWithNoTests

      - name: Publish ${{ matrix.package }}
        run: pnpm --filter "${{ matrix.package }}" publish --no-git-checks --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
