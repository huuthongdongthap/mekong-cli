name: Algo Trader Deploy to GCP Cloud Run

on:
  push:
    branches: [main, master]
    paths:
      - 'apps/algo-trader/**'
      - 'packages/trading-core/**'
      - 'packages/vibe-arbitrage-engine/**'
      - 'packages/vibe-billing-trading/**'
      - '.github/workflows/algo-trader-deploy.yml'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging

env:
  GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  GCP_REGION: us-central1
  SERVICE_NAME: algo-trader

jobs:
  deploy:
    name: Deploy to Cloud Run
    runs-on: ubuntu-latest
    needs: [docker]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Google Auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS }}

      - name: Configure GCP
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}

      - name: Configure Docker for Artifact Registry
        run: |
          gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

      - name: Deploy to Cloud Run
        id: deploy
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE_NAME }}
          image: us-central1-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/algo-trader/algo-trader:${{ github.sha }}
          region: ${{ env.GCP_REGION }}
          platform: managed
          env_vars: |
            NODE_ENV=production
            ENABLE_LIVE_TRADING=true
            ENABLE_BACKTESTING=false
          secrets: |
            EXCHANGE_API_KEY=exchange-api-key:latest
            EXCHANGE_SECRET=exchange-secret:latest

      - name: Show Output
        run: |
          echo "Service URL: ${{ steps.deploy.outputs.url }}"

  post-deploy-verify:
    name: Verify Deployment
    runs-on: ubuntu-latest
    needs: [deploy]
    if: always()

    steps:
      - name: Google Auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS }}

      - name: Get Cloud Run URL
        id: get-url
        run: |
          URL=$(gcloud run services describe ${{ env.SERVICE_NAME }} \
            --region ${{ env.GCP_REGION }} \
            --format 'value(status.url)')
          echo "url=$URL" >> $GITHUB_OUTPUT

      - name: Health Check
        run: |
          curl -f "${{ steps.get-url.outputs.url }}/health" || exit 1

      - name: Deployment Summary
        if: always()
        run: |
          echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Step | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Docker Build | ${{ needs.deploy.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Cloud Run Deploy | ${{ needs.deploy.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Health Check | ${{ job.status == 'success' && 'Passed' || 'Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Service URL: ${{ steps.get-url.outputs.url }}" >> $GITHUB_STEP_SUMMARY
