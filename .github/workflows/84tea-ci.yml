name: 84tea CI/CD Pipeline

on:
  push:
    branches: [main, feature/*]
    paths:
      - 'apps/84tea/**'
      - '.github/workflows/84tea-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'apps/84tea/**'

env:
  NODE_VERSION: '20'
  WORKING_DIRECTORY: apps/84tea

jobs:
  # ═══════════════════════════════════════════════════════════
  # Build & Type Check
  # ═══════════════════════════════════════════════════════════
  build:
    name: 🏗️ Build & Type Check
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: ${{ env.WORKING_DIRECTORY }}/package-lock.json

      - name: 📚 Install dependencies
        working-directory: ${{ env.WORKING_DIRECTORY }}
        run: npm ci

      - name: 🔍 Type Check
        working-directory: ${{ env.WORKING_DIRECTORY }}
        run: npx tsc --noEmit

      - name: 🏗️ Build Production
        working-directory: ${{ env.WORKING_DIRECTORY }}
        run: npm run build

      - name: 📊 Build Summary
        if: always()
        run: |
          echo "## 🏗️ Build Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Node.js | v${{ env.NODE_VERSION }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Framework | Next.js 16.x (Turbopack) |" >> $GITHUB_STEP_SUMMARY
          echo "| Build Status | ${{ job.status == 'success' && '✅ Passed' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY

  # ═══════════════════════════════════════════════════════════
  # Lint & Code Quality
  # ═══════════════════════════════════════════════════════════
  lint:
    name: 🔬 Lint & Code Quality
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: ${{ env.WORKING_DIRECTORY }}/package-lock.json

      - name: 📚 Install dependencies
        working-directory: ${{ env.WORKING_DIRECTORY }}
        run: npm ci

      - name: 🔬 ESLint Check
        working-directory: ${{ env.WORKING_DIRECTORY }}
        run: npm run lint || true
        continue-on-error: true

  # ═══════════════════════════════════════════════════════════
  # Accessibility Audit (Lighthouse CI)
  # ═══════════════════════════════════════════════════════════
  accessibility:
    name: ♿ Accessibility Audit
    runs-on: ubuntu-latest
    needs: build
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: ${{ env.WORKING_DIRECTORY }}/package-lock.json

      - name: 📚 Install dependencies
        working-directory: ${{ env.WORKING_DIRECTORY }}
        run: npm ci

      - name: 🏗️ Build for Lighthouse
        working-directory: ${{ env.WORKING_DIRECTORY }}
        run: npm run build

      - name: 🚀 Start server and run Lighthouse
        working-directory: ${{ env.WORKING_DIRECTORY }}
        run: |
          npm start &
          sleep 10
          npx lighthouse http://localhost:3000 \
            --output=json \
            --output-path=./lighthouse-report.json \
            --chrome-flags="--headless --no-sandbox" \
            --only-categories=accessibility,performance,best-practices,seo || true

      - name: 📊 Lighthouse Summary
        if: always()
        working-directory: ${{ env.WORKING_DIRECTORY }}
        run: |
          if [ -f lighthouse-report.json ]; then
            echo "## 🔦 Lighthouse Audit Results" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "| Category | Score |" >> $GITHUB_STEP_SUMMARY
            echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
            echo "| Performance | $(jq -r '.categories.performance.score * 100' lighthouse-report.json)% |" >> $GITHUB_STEP_SUMMARY
            echo "| Accessibility | $(jq -r '.categories.accessibility.score * 100' lighthouse-report.json)% |" >> $GITHUB_STEP_SUMMARY
            echo "| Best Practices | $(jq -r '.categories["best-practices"].score * 100' lighthouse-report.json)% |" >> $GITHUB_STEP_SUMMARY
            echo "| SEO | $(jq -r '.categories.seo.score * 100' lighthouse-report.json)% |" >> $GITHUB_STEP_SUMMARY
          fi

  # ═══════════════════════════════════════════════════════════
  # PR Status Check (Required for merge)
  # ═══════════════════════════════════════════════════════════
  pr-check:
    name: ✅ PR Ready
    runs-on: ubuntu-latest
    needs: [build, lint]
    if: github.event_name == 'pull_request'
    
    steps:
      - name: 🎉 All checks passed
        run: |
          echo "## ✅ PR Ready for Review" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "All required checks have passed:" >> $GITHUB_STEP_SUMMARY
          echo "- 🏗️ Build & Type Check: ✅" >> $GITHUB_STEP_SUMMARY
          echo "- 🔬 Lint & Code Quality: ✅" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "This PR is ready for code review and merge." >> $GITHUB_STEP_SUMMARY
