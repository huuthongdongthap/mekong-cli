name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ------------------------------------------------------------------
  # JOB 1: BACKEND (Python / PEV Engine / CLI Core)
  # ------------------------------------------------------------------
  backend:
    name: Backend (Python 3.11+)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install "ruff>=0.9,<1.0" pytest pytest-asyncio anyio "httpx<0.28" pytest-cov
          pip install -e .

      - name: Lint (Ruff)
        run: ruff check src/

      - name: Format check (Ruff)
        run: ruff format --check src/
        continue-on-error: true

      - name: Type check (pyright/mypy not required — ruff covers basic checks)
        run: echo "Skipping strict type-check; ruff lint above covers type issues"

      - name: Verify CLI entry point
        run: mekong --help
        continue-on-error: true
        env:
          PYTHONPATH: ${{ github.workspace }}
          JWT_SECRET: ${{ secrets.JWT_SECRET || 'ci-test-placeholder' }}

      - name: Run tests (public packages only — no apps/, no backend integration)
        run: |
          pytest tests/ \
            --ignore=tests/backend \
            --ignore=tests/integration \
            --ignore=tests/raas \
            --ignore=tests/e2e \
            --ignore=tests/benchmarks \
            --ignore=tests/test_agi_loop.py \
            -v --tb=short \
            --cov=src \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-fail-under=40
        env:
          PYTHONPATH: ${{ github.workspace }}
          JWT_SECRET: ${{ secrets.JWT_SECRET || 'ci-test-placeholder' }}

      - name: Upload coverage report
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 7

  # ------------------------------------------------------------------
  # JOB 2: TYPESCRIPT PACKAGES (public packages/* only, never apps/)
  # ------------------------------------------------------------------
  typescript:
    name: TypeScript Packages
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies (public packages only)
        run: pnpm install --filter "./packages/**" --no-frozen-lockfile

      - name: Type check (mekong-engine)
        run: pnpm --filter mekong-engine typecheck
        continue-on-error: true

      - name: Run tests (mekong-engine)
        run: pnpm --filter mekong-engine test
        continue-on-error: true

      - name: Build (mekong-engine)
        run: pnpm --filter mekong-engine build
        continue-on-error: true

  # ------------------------------------------------------------------
  # JOB 3: SECURITY SCAN
  # ------------------------------------------------------------------
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install security tools
        run: |
          python -m pip install --upgrade pip
          pip install bandit safety

      - name: Static security analysis (Bandit)
        run: bandit -r src/ -ll --exit-zero

      - name: Dependency vulnerability check (Safety)
        run: safety check -r requirements.txt --ignore 70612
        continue-on-error: true

      - name: Check for hardcoded secrets in src/
        run: |
          echo "Scanning for hardcoded secrets..."
          if grep -rEn "(API_KEY|SECRET|PASSWORD)\s*=\s*['\"][^'\"]{8,}['\"]" src/ \
              --include="*.py" \
              | grep -v "os\.getenv\|os\.environ\|\.env\|test\|example" ; then
            echo "ERROR: Hardcoded secrets detected in src/"
            exit 1
          fi
          echo "OK: No hardcoded secrets found"

  # ------------------------------------------------------------------
  # JOB 4: RAAS GATEWAY (TypeScript Cloudflare Worker)
  # ------------------------------------------------------------------
  raas-gateway-tests:
    name: RaaS Gateway Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install raas-gateway dependencies
        run: pnpm --filter raas-gateway install --no-frozen-lockfile

      - name: Run raas-gateway tests
        run: pnpm --filter raas-gateway test
        continue-on-error: true
