name: Zalo Auto Sales — Deploy

on:
  push:
    branches: [main]
    paths:
      - 'zalo-auto-sales/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy Worker
    defaults:
      run:
        working-directory: zalo-auto-sales

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: zalo-auto-sales/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Run D1 migrations
        run: |
          npx wrangler d1 execute zalo-auto-sales --remote --file=src/db/schema.sql
          npx wrangler d1 execute zalo-auto-sales --remote --file=src/db/migration-v2.sql
          npx wrangler d1 execute zalo-auto-sales --remote --file=src/db/migration-v3.sql
          npx wrangler d1 execute zalo-auto-sales --remote --file=src/db/migration-v4.sql
          npx wrangler d1 execute zalo-auto-sales --remote --file=src/db/migration-v5.sql
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy to Cloudflare Workers
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
