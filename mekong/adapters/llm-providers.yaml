# LLM Provider Registry — User reference only
# Mekong CLI only needs 3 vars: LLM_BASE_URL + LLM_API_KEY + LLM_MODEL
# All providers below are compatible.

# ─── PRIMARY PROVIDER — Antigravity Proxy (OpenClaw Gateway) ─────
primary:
  name: antigravity-proxy
  provider: openclaw
  base_url: http://localhost:18789/v1
  model: claude-sonnet-4-20250514
  timeout: 120
  retry_count: 3
  retry_delay: 2
  note: "Antigravity Proxy via OpenClaw Gateway — routes to Claude/Gemini"
# ─────────────────────────────────────────────────────────────────

presets:
  # --- CHINA ---
  qwen-coding-plan:
    base_url: "https://dashscope.aliyuncs.com/compatible-mode/v1"
    model: "qwen3-coder-plus"
    note: "Alibaba Coding Plan ~$10/mo, unlimited"
    setup: "https://bailian.console.aliyun.com"

  qwen-international:
    base_url: "https://dashscope-intl.aliyuncs.com/compatible-mode/v1"
    model: "qwen3-coder-plus"
    note: "International endpoint"

  qwen-image:
    base_url: "https://dashscope.aliyuncs.com/api/v1/services/aigc/text2image/image-synthesis"
    model: "qwen-image-plus"
    note: "Qwen Image 20B — text-to-image generation, uses same DASHSCOPE_API_KEY"
    models:
      - qwen-image-plus    # Fast, ~¥0.04/image
      - qwen-image-max     # Highest quality, ~¥0.16/image

  deepseek:
    base_url: "https://api.deepseek.com"
    model: "deepseek-chat"
    note: "$0.27/100K tokens, MIT model"
    setup: "https://platform.deepseek.com"

  # --- ROUTERS (multi-model) ---
  openrouter:
    base_url: "https://openrouter.ai/api/v1"
    model: "anthropic/claude-sonnet-4"
    note: "300+ models, $5 free signup"
    setup: "https://openrouter.ai"

  agentrouter:
    base_url: "https://agentrouter.org/v1"
    model: "claude-sonnet-4-6-20250514"
    note: "$200 free credits"
    setup: "https://agentrouter.org"

  # --- US ---
  openai:
    base_url: "https://api.openai.com/v1"
    model: "gpt-4o"

  anthropic:
    base_url: "https://api.anthropic.com/v1"
    model: "claude-sonnet-4-6-20250514"
    note: "Native Anthropic protocol"

  # --- EU ---
  deepinfra:
    base_url: "https://api.deepinfra.com/v1/openai"
    model: "deepseek-ai/DeepSeek-V3.2"
    note: "EU hosting available"

  # --- HOSTING ---
  fireworks:
    base_url: "https://api.fireworks.ai/inference/v1"
    model: "accounts/fireworks/models/qwen3-coder-plus"

  together:
    base_url: "https://api.together.xyz/v1"
    model: "deepseek-ai/DeepSeek-V3"

  # --- LOCAL (FREE) ---
  mlx:
    base_url: "http://localhost:11435/v1"
    model: "mlx-community/DeepSeek-R1-Distill-Qwen-32B-4bit"
    note: "Free, offline, Apple Silicon optimized, full memory bandwidth"
    setup: "pip install mlx-lm && python -m mlx_lm.server --model mlx-community/DeepSeek-R1-Distill-Qwen-32B-4bit --port 11435"


  lmstudio:
    base_url: "http://localhost:1234/v1"
    model: "loaded-model"
    note: "GUI, easy model management"

  # --- FREE (no key) ---
  puter:
    base_url: "https://api.puter.com/puterai/openai/v1/"
    model: "qwen/qwen3-coder-plus"
    note: "Free, no key needed, rate limited"

