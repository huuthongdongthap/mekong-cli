version: '3.8'

services:
  # -------------------------------------------------------------------------
  # Infrastructure
  # -------------------------------------------------------------------------
  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # -------------------------------------------------------------------------
  # Engine Layer (Node.js + Fastify)
  # -------------------------------------------------------------------------
  engine:
    build:
      context: ./apps/engine
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - DATABASE_URL=file:/data/dev.db
    volumes:
      - agency-data:/data
    depends_on:
      redis:
        condition: service_healthy

  # -------------------------------------------------------------------------
  # Worker Layer (Node.js + BullMQ)
  # -------------------------------------------------------------------------
  worker:
    build:
      context: ./apps/worker
      dockerfile: Dockerfile
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - DATABASE_URL=file:/data/dev.db
    volumes:
      - agency-data:/data
    depends_on:
      redis:
        condition: service_healthy
      engine:
        condition: service_started # Ensure engine runs migrations first (if auto-migrating)

  # -------------------------------------------------------------------------
  # Money Layer (Python + FastAPI)
  # -------------------------------------------------------------------------
  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - APP_ENV=docker
      # Ensure it connects to the same Mock DB or a real DB if configured
    volumes:
      - .:/app # Hot reload for development (optional, can remove for prod)

volumes:
  agency-data:
