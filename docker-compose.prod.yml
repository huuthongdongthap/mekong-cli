version: '3.8'

services:
  # -------------------------------------------------------------------------
  # Infrastructure
  # -------------------------------------------------------------------------
  redis:
    image: redis:alpine
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # -------------------------------------------------------------------------
  # Engine Layer (Node.js + Fastify)
  # -------------------------------------------------------------------------
  engine:
    build:
      context: ./apps/engine
      dockerfile: Dockerfile
    restart: always
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - DATABASE_URL=file:/data/prod.db
    volumes:
      - agency-data:/data
    depends_on:
      redis:
        condition: service_healthy

  # -------------------------------------------------------------------------
  # Worker Layer (Node.js + BullMQ)
  # -------------------------------------------------------------------------
  worker:
    build:
      context: ./apps/worker
      dockerfile: Dockerfile
    restart: always
    environment:
      - NODE_ENV=production
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - DATABASE_URL=file:/data/prod.db
    volumes:
      - agency-data:/data
    depends_on:
      redis:
        condition: service_healthy
      engine:
        condition: service_started

  # -------------------------------------------------------------------------
  # Money Layer (Python + FastAPI)
  # -------------------------------------------------------------------------
  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    restart: always
    ports:
      - "8000:8000"
    env_file:
      - .env.prod
    environment:
      - APP_ENV=production
    volumes:
      - agency-data:/data  # If API needs access to SQLite, though normally it has its own or shared PG
    depends_on:
      redis:
        condition: service_healthy

volumes:
  redis-data:
  agency-data:
