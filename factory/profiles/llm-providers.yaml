# LLM Provider Configuration — BYOK (Bring Your Own Key)
# User chọn 1 trong 3 modes. Platform KHÔNG proxy, KHÔNG trả tiền LLM.

providers:
  openrouter:
    name: "OpenRouter"
    description: "API gateway cho 200+ models (Claude, GPT, Gemini, Llama, Mistral)"
    base_url: "https://openrouter.ai/api/v1"
    env_key: "OPENROUTER_API_KEY"
    default_model: "anthropic/claude-sonnet-4"
    fallback_models:
      - "anthropic/claude-haiku-4"
      - "google/gemini-2.5-flash"
      - "meta-llama/llama-4-scout"
    setup_guide: |
      1. Vào https://openrouter.ai → Sign up
      2. Add $5 credits (hoặc dùng free models)
      3. Copy API key → paste vào .env
    pros: ["200+ models", "auto-fallback", "pay-per-token", "free tier available"]
    cons: ["cần internet", "cần API key"]

  mlx:
    name: "MLX (Local — Apple Silicon)"
    description: "LLM chạy local via MLX, tối ưu Apple Silicon, full memory bandwidth"
    base_url: "http://localhost:11435/v1"
    env_key: "LOCAL_LLM_URL"
    default_model: "mlx-community/DeepSeek-R1-Distill-Qwen-32B-4bit"
    recommended_models:
      - model: "mlx-community/DeepSeek-R1-Distill-Qwen-32B-4bit"
        ram: "24GB"
        quality: "Excellent — reasoning + coding"
      - model: "mlx-community/Qwen2.5-Coder-32B-Instruct-4bit"
        ram: "24GB"
        quality: "Best — coding tasks"
      - model: "mlx-community/Llama-3.3-70B-Instruct-4bit"
        ram: "48GB"
        quality: "Excellent — general tasks"
    setup_guide: |
      1. pip install mlx-lm
      2. python -m mlx_lm.server --model mlx-community/DeepSeek-R1-Distill-Qwen-32B-4bit --port 11435
      3. Server chạy trên port 11435 (OpenAI-compatible)
    pros: ["miễn phí", "offline", "Apple Silicon optimized", "full memory bandwidth"]
    cons: ["chỉ chạy trên Apple Silicon", "cần RAM lớn"]

  ollama:
    name: "Ollama (Local — Cross-platform)"
    description: "LLM chạy local, miễn phí, offline, cross-platform (legacy — prefer MLX on Mac)"
    base_url: "http://localhost:11434/v1"
    env_key: "OLLAMA_BASE_URL"
    default_model: "llama3.2"
    setup_guide: |
      1. curl -fsSL https://ollama.ai/install.sh | sh
      2. ollama pull llama3.2
    pros: ["miễn phí", "offline", "cross-platform"]
    cons: ["chậm hơn MLX trên Apple Silicon", "bandwidth bị chia sẻ"]

  direct:
    name: "Direct API"
    description: "Kết nối trực tiếp Anthropic, OpenAI, hoặc Google"
    providers:
      anthropic:
        base_url: "https://api.anthropic.com/v1"
        env_key: "ANTHROPIC_API_KEY"
        default_model: "claude-sonnet-4-6-20250514"
      openai:
        base_url: "https://api.openai.com/v1"
        env_key: "OPENAI_API_KEY"
        default_model: "gpt-4o"
      google:
        base_url: "https://generativelanguage.googleapis.com/v1beta"
        env_key: "GOOGLE_API_KEY"
        default_model: "gemini-2.5-flash"
    setup_guide: |
      1. Lấy API key từ provider bạn chọn
      2. Set vào .env: ANTHROPIC_API_KEY=sk-ant-...
    pros: ["hiệu năng tốt nhất", "direct connection"]
    cons: ["cần API key", "locked vào 1 provider"]

# Hybrid mode: user có thể set NHIỀU provider
# System sẽ failover: OpenRouter → Direct → MLX → Ollama
failover_order: ["openrouter", "direct", "mlx", "ollama"]
